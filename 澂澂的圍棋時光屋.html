  <style>
:root {
  --red: #ff5252;
  --red-dark: #e53935;
  --wood: #f3b95f;
  --cream: #fff8ec;
  --ink: #3a2a16;
  --green: #43b581;
  --blue: #4aa3ff;
  --shadow: 0 4px 0 rgba(0,0,0,.15);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  background: radial-gradient(circle at 30% 0%, #fff6df 0%, #ffe9c2 60%, #ffd99a 100%);
  color: var(--ink);
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 18px 12px 6px;
}
header h1 {
  margin: 0;
  font-size: 30px;
  letter-spacing: 2px;
}
header h1 .go { color: var(--red); }
header p { margin: 4px 0 0; font-size: 14px; opacity: .7; }

/* 模式分頁 */
.tabs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 14px 0 6px;
  flex-wrap: wrap;
}
.tab {
  border: none;
  background: #fff;
  color: var(--ink);
  font-size: 17px;
  font-weight: 700;
  padding: 10px 22px;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .08s, background .15s;
}
.tab:active { transform: translateY(2px); }
.tab.active { background: var(--red); color: #fff; }

/* 版面 */
.page { display: none; padding: 10px 14px 40px; }
.page.active { display: block; }

.layout {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: wrap;
  max-width: 1000px;
  margin: 0 auto;
}

.board-wrap {
  background: #fff;
  padding: 12px;
  border-radius: 18px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
}
canvas {
  display: block;
  border-radius: 10px;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform .1s;
}
canvas.celebrate { animation: pop .5s ease; }
@keyframes pop {
  0%,100% { transform: scale(1); }
  30% { transform: scale(1.03) rotate(-1deg); }
  60% { transform: scale(1.03) rotate(1deg); }
}

/* 側欄面板 */
.panel {
  background: var(--cream);
  border-radius: 18px;
  padding: 18px;
  width: 300px;
  box-shadow: var(--shadow);
}
.panel h2 { margin: 0 0 10px; font-size: 20px; }

.row {
  display: flex;
  gap: 10px;
  margin: 10px 0;
  flex-wrap: wrap;
}

.stat {
  flex: 1;
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  min-width: 80px;
}
.stat .label { font-size: 12px; opacity: .65; }
.stat .value { font-size: 22px; font-weight: 800; }

.turn-badge {
  text-align: center;
  font-size: 22px;
  font-weight: 800;
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
}

button.btn {
  border: none;
  border-radius: 12px;
  padding: 11px 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  color: #fff;
  background: var(--blue);
  box-shadow: var(--shadow);
  flex: 1;
  min-width: 78px;
  transition: transform .08s, filter .15s;
}
button.btn:active { transform: translateY(2px); }
button.btn:disabled { background: #c9c4bb; cursor: not-allowed; box-shadow: none; }
button.btn.red { background: var(--red); }
button.btn.green { background: var(--green); }
button.btn.gray { background: #8a8577; }

select {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 12px;
  border: 2px solid #e6ddc9;
  font-size: 15px;
  font-weight: 600;
  background: #fff;
  color: var(--ink);
}

.status {
  min-height: 24px;
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  background: #fff;
}
.status.ok { background: #e5f8ee; color: #1e7d52; }
.status.warn { background: #fff3e0; color: #b26a00; }

.score { margin-top: 8px; font-size: 13px; opacity: .7; text-align: center; }

/* 解說框 */
.teach {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  background: #eef4ff;
  color: #234;
  font-size: 14px;
  line-height: 1.55;
  min-height: 0;
}
.teach:empty { display: none; }
.teach-toggle {
  display: block;
  margin-top: 8px;
  font-size: 13px;
  opacity: .8;
  cursor: pointer;
  user-select: none;
}

/* 練習頁 */
.prob-title { margin: 0 0 8px; font-size: 20px; color: var(--red-dark); }
.prob-desc { font-size: 15px; line-height: 1.6; }
.hint {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  background: #fff7d6;
  color: #8a6d00;
  font-size: 14px;
  display: none;
}
.hint.show { display: block; }
.progress { text-align: center; font-weight: 700; margin: 6px 0; opacity: .7; }

/* 星星關卡列 */
.stars {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: center;
  margin: 8px 0 12px;
}
.star {
  width: 30px;
  height: 30px;
  border: none;
  border-radius: 50%;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  background: #ece5d5;
  color: #a89a7c;
  box-shadow: 0 2px 0 rgba(0,0,0,.1);
  transition: transform .08s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.star:active { transform: translateY(2px); }
.star.done { background: #ffe9a8; color: #d99b00; }
.star.current { outline: 3px solid var(--red); outline-offset: 1px; }

.btn.reset {
  width: 100%;
  margin-top: 10px;
  font-size: 13px;
  background: #b8b0a0;
}

/* ===== 過關特效 ===== */
.fx-banner {
  position: fixed;
  left: 50%;
  top: 38%;
  transform: translate(-50%, -50%) scale(0.2);
  z-index: 9999;
  pointer-events: none;
  font-size: 42px;
  font-weight: 900;
  color: #fff;
  text-align: center;
  padding: 18px 34px;
  border-radius: 24px;
  background: linear-gradient(135deg, #ff5252, #ff8a3d);
  box-shadow: 0 12px 40px rgba(0,0,0,.3), 0 0 0 6px rgba(255,255,255,.6);
  opacity: 0;
  white-space: nowrap;
  text-shadow: 0 3px 0 rgba(0,0,0,.15);
}
.fx-banner .sub { font-size: 26px; display: block; margin-top: 4px; }
.fx-banner.big {
  font-size: 54px;
  background: linear-gradient(135deg, #ff3b6b, #ffb300 60%, #43d17a);
}
.fx-banner.show {
  animation: fxpop .6s cubic-bezier(.2,1.6,.4,1) forwards;
}
.fx-banner.out {
  animation: fxout .6s ease forwards;
}
@keyframes fxpop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.2) rotate(-12deg); }
  60%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15) rotate(4deg); }
  80%  { transform: translate(-50%,-50%) scale(.95) rotate(-2deg); }
  100% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0); }
}
@keyframes fxout {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-140%) scale(.7); }
}

@keyframes fxshake {
  0%,100% { transform: translate(0,0) rotate(0); }
  20% { transform: translate(-6px,3px) rotate(-1.5deg); }
  40% { transform: translate(6px,-3px) rotate(1.5deg); }
  60% { transform: translate(-5px,-2px) rotate(-1deg); }
  80% { transform: translate(5px,2px) rotate(1deg); }
}
.fx-shake { animation: fxshake .45s ease; }
@keyframes fxshakebig {
  0%,100% { transform: translate(0,0) rotate(0); }
  15% { transform: translate(-10px,5px) rotate(-2.5deg); }
  30% { transform: translate(10px,-5px) rotate(2.5deg); }
  45% { transform: translate(-9px,-4px) rotate(-2deg); }
  60% { transform: translate(9px,4px) rotate(2deg); }
  75% { transform: translate(-6px,3px) rotate(-1deg); }
}
.fx-shake-big { animation: fxshakebig .7s ease; }

footer { text-align: center; font-size: 12px; opacity: .5; padding: 10px; }
.switch-link {
  display: inline-block;
  margin-top: 6px;
  color: var(--red);
  font-weight: 700;
  text-decoration: none;
  opacity: 1;
}
.switch-link:hover { text-decoration: underline; }

@media (max-width: 720px) {
  .panel { width: 100%; max-width: 420px; }
}

</style>
</head>
<body>
  <header>
    <h1>🐣 澂澂的<span class="go">圍棋</span>時光屋 🎯</h1>
    <p>13 路棋盤 · 澂澂專屬的圍棋入門樂園</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-page="vs">⚔️ 對戰</button>
    <button class="tab" data-page="practice">🧩 棋形練習</button>
  </div>

  <!-- ===== 對戰頁 ===== -->
  <section id="page-vs" class="page active">
    <div class="layout">
      <div class="board-wrap">
        <canvas id="vs-canvas" width="560" height="560"></canvas>
      </div>
      <div class="panel">
        <h2>⚔️ 對戰</h2>
        <select id="vs-mode">
          <option value="ai">🤖 我 vs 電腦（適合練習）</option>
          <option value="human">👫 兩個人一起下</option>
        </select>
        <select id="vs-level" title="對手等級">
          <option value="0">🐣 入門（約 20 級）</option>
          <option value="1" selected>🌱 初學（約 15 級）</option>
          <option value="2">🙂 初級（約 10 級）</option>
          <option value="3">💪 中級（約 5 級）</option>
          <option value="4">🔥 高級（約 1 級）</option>
          <option value="5">🏆 高手（約 1 段）</option>

  <script>
/* 圍棋規則核心引擎 —— 13 路棋盤
   負責：落子、氣的計算、提子、禁著點(自殺)、打劫(簡易 ko)
   不含任何畫面邏輯，方便對戰與練習共用 */

(function (global) {
  'use strict';

  var EMPTY = 0;
  var BLACK = 1;
  var WHITE = 2;

  function GoEngine(size) {
    this.size = size || 13;
    this.reset();
  }

  GoEngine.EMPTY = EMPTY;
  GoEngine.BLACK = BLACK;
  GoEngine.WHITE = WHITE;

  GoEngine.prototype.reset = function () {
    var n = this.size;
    this.board = [];
    for (var y = 0; y < n; y++) {
      var row = [];
      for (var x = 0; x < n; x++) row.push(EMPTY);
      this.board.push(row);
    }
    this.turn = BLACK;            // 黑先
    this.captures = { 1: 0, 2: 0 }; // 各方提子數
    this.koPoint = null;         // 打劫禁著點 {x,y}
    this.history = [];           // 每步快照，供悔棋
    this.lastMove = null;
    this.passes = 0;
  };

  GoEngine.prototype.inBounds = function (x, y) {
    return x >= 0 && y >= 0 && x < this.size && y < this.size;
  };

  GoEngine.prototype.get = function (x, y) {
    return this.board[y][x];
  };

  GoEngine.prototype.opponent = function (color) {
    return color === BLACK ? WHITE : BLACK;
  };

  // 取得某顆棋子所屬的整塊(相連同色) + 這塊的氣
  GoEngine.prototype.groupAndLiberties = function (x, y) {
    var color = this.board[y][x];
    var stones = [];
    var liberties = {};
    var seen = {};
    var stack = [[x, y]];
    seen[x + ',' + y] = true;
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    while (stack.length) {
      var cur = stack.pop();
      var cx = cur[0], cy = cur[1];
      stones.push({ x: cx, y: cy });
      for (var i = 0; i < 4; i++) {
        var nx = cx + dirs[i][0], ny = cy + dirs[i][1];
        if (!this.inBounds(nx, ny)) continue;
        var v = this.board[ny][nx];
        if (v === EMPTY) {
          liberties[nx + ',' + ny] = true;
        } else if (v === color && !seen[nx + ',' + ny]) {
          seen[nx + ',' + ny] = true;
          stack.push([nx, ny]);
        }
      }
    }
    return { stones: stones, liberties: Object.keys(liberties).length };
  };

  // 計算某座標若有棋子的氣數（不改動棋盤）
  GoEngine.prototype.libertiesAt = function (x, y) {
    if (this.board[y][x] === EMPTY) return 0;
    return this.groupAndLiberties(x, y).liberties;
  };

  // 試落子，回傳結果物件而不修改棋盤（供 AI / 練習判斷）
  // { legal, reason, captured:[{x,y}...] }
  GoEngine.prototype.tryPlay = function (x, y, color) {
    if (!this.inBounds(x, y)) return { legal: false, reason: 'out' };
    if (this.board[y][x] !== EMPTY) return { legal: false, reason: 'occupied' };
    if (this.koPoint && this.koPoint.x === x && this.koPoint.y === y) {
      return { legal: false, reason: 'ko' };
    }

    var opp = this.opponent(color);
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    // 暫放
    this.board[y][x] = color;
    var captured = [];
    var capKeys = {};

    // 檢查四鄰敵子是否被提
    for (var i = 0; i < 4; i++) {
      var nx = x + dirs[i][0], ny = y + dirs[i][1];
      if (!this.inBounds(nx, ny)) continue;
      if (this.board[ny][nx] === opp) {
        var g = this.groupAndLiberties(nx, ny);
        if (g.liberties === 0) {
          for (var j = 0; j < g.stones.length; j++) {
            var s = g.stones[j];
            var k = s.x + ',' + s.y;
            if (!capKeys[k]) { capKeys[k] = true; captured.push(s); }
          }
        }
      }
    }

    // 若沒提到子，檢查自己是否有氣（禁自殺）
    if (captured.length === 0) {
      var self = this.groupAndLiberties(x, y);
      if (self.liberties === 0) {
        this.board[y][x] = EMPTY; // 還原
        return { legal: false, reason: 'suicide' };
      }
    }

    this.board[y][x] = EMPTY; // 還原（tryPlay 不改棋盤）
    return { legal: true, captured: captured };
  };

  // 正式落子；成功回傳 true
  GoEngine.prototype.play = function (x, y) {
    var color = this.turn;
    var res = this.tryPlay(x, y, color);
    if (!res.legal) return res;

    this.pushHistory();

    var opp = this.opponent(color);
    this.board[y][x] = color;
    for (var i = 0; i < res.captured.length; i++) {
      var c = res.captured[i];
      this.board[c.y][c.x] = EMPTY;
    }
    this.captures[color] += res.captured.length;

    // 簡易打劫：只提 1 子、且自身也只有 1 氣時，設禁著點
    if (res.captured.length === 1) {
      var self = this.groupAndLiberties(x, y);
      if (self.liberties === 1 && self.stones.length === 1) {
        this.koPoint = { x: res.captured[0].x, y: res.captured[0].y };
      } else {
        this.koPoint = null;
      }
    } else {
      this.koPoint = null;
    }

    this.lastMove = { x: x, y: y, color: color };
    this.turn = opp;
    this.passes = 0;
    return { legal: true, captured: res.captured };
  };

  GoEngine.prototype.pass = function () {
    this.pushHistory();
    this.koPoint = null;
    this.lastMove = null;
    this.passes += 1;
    this.turn = this.opponent(this.turn);
    return this.passes >= 2; // 連續兩 pass 即終局
  };

  GoEngine.prototype.pushHistory = function () {
    this.history.push({
      board: this.board.map(function (r) { return r.slice(); }),
      turn: this.turn,
      captures: { 1: this.captures[1], 2: this.captures[2] },
      koPoint: this.koPoint ? { x: this.koPoint.x, y: this.koPoint.y } : null,
      lastMove: this.lastMove
    });
  };

  GoEngine.prototype.undo = function () {
    if (!this.history.length) return false;
    var s = this.history.pop();
    this.board = s.board.map(function (r) { return r.slice(); });
    this.turn = s.turn;
    this.captures = { 1: s.captures[1], 2: s.captures[2] };
    this.koPoint = s.koPoint;
    this.lastMove = s.lastMove;
    this.passes = 0;
    return true;
  };

  // 找出所有合法落子點（給 AI 用）
  GoEngine.prototype.legalMoves = function (color) {
    var moves = [];
    for (var y = 0; y < this.size; y++) {
      for (var x = 0; x < this.size; x++) {
        if (this.board[y][x] !== EMPTY) continue;
        var r = this.tryPlay(x, y, color);
        if (r.legal) moves.push({ x: x, y: y, captured: r.captured.length });
      }
    }
    return moves;
  };

  // 簡易數子(面積法)：空點若只被單一顏色包圍算該方地
  // 兒童版粗略估算，回傳 { black, white }
  GoEngine.prototype.scoreEstimate = function () {
    var n = this.size;
    var visited = {};
    var territory = { 1: 0, 2: 0 };
    var stoneCount = { 1: 0, 2: 0 };
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    for (var y = 0; y < n; y++) {
      for (var x = 0; x < n; x++) {
        var v = this.board[y][x];
        if (v === BLACK) stoneCount[1]++;
        else if (v === WHITE) stoneCount[2]++;
        else {
          var key = x + ',' + y;
          if (visited[key]) continue;
          // flood fill 這塊空地
          var region = [];
          var borders = {};
          var stack = [[x, y]];
          visited[key] = true;
          while (stack.length) {
            var c = stack.pop();
            region.push(c);
            for (var i = 0; i < 4; i++) {
              var nx = c[0] + dirs[i][0], ny = c[1] + dirs[i][1];
              if (!this.inBounds(nx, ny)) continue;
              var nv = this.board[ny][nx];
              if (nv === EMPTY) {
                var nk = nx + ',' + ny;
                if (!visited[nk]) { visited[nk] = true; stack.push([nx, ny]); }
              } else {
                borders[nv] = true;
              }
            }
          }
          if (borders[BLACK] && !borders[WHITE]) territory[1] += region.length;
          else if (borders[WHITE] && !borders[BLACK]) territory[2] += region.length;
        }
      }
    }
    return {
      black: stoneCount[1] + territory[1],
      white: stoneCount[2] + territory[2],
      blackTerritory: territory[1],
      whiteTerritory: territory[2]
    };
  };

  // 由外部佈局（練習題用）：stones = [{x,y,color}], turn
  GoEngine.prototype.setup = function (stones, turn) {
    this.reset();
    for (var i = 0; i < stones.length; i++) {
      var s = stones[i];
      this.board[s.y][s.x] = s.color;
    }
    this.turn = turn || BLACK;
    this.history = [];
  };

  global.GoEngine = GoEngine;
})(window);

</script>
  <script>
/* Canvas 棋盤繪製器 —— 童趣木紋棋盤、立體棋子、星位、最後一手標記
   對外：new BoardRenderer(canvas, engine, options)
        .draw()           重繪
        .onPoint(cb)      註冊點擊格點回呼 (x,y)
        .setMarks(arr)    設定額外標記（練習提示用） */

(function (global) {
  'use strict';

  var BLACK = 1, WHITE = 2, EMPTY = 0;

  function BoardRenderer(canvas, engine, options) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.engine = engine;
    this.opts = options || {};
    this.eink = !!this.opts.eink;  // 墨水模式：純黑白、實心、無漸層、關閉落子預覽
    this.marks = [];          // [{x,y,type:'circle|triangle|square|dot', color, text}]
    this.ghost = null;        // 滑鼠預覽落子點
    this.pointCb = null;
    this._bindEvents();
    this.resize();
  }

  BoardRenderer.prototype.resize = function () {
    // 依 CSS 尺寸配置高解析度畫布
    var rect = this.canvas.getBoundingClientRect();
    var px = Math.max(300, Math.min(rect.width || 560, 640));
    var dpr = global.devicePixelRatio || 1;
    this.pixel = px;
    this.canvas.width = px * dpr;
    this.canvas.height = px * dpr;
    this.canvas.style.width = px + 'px';
    this.canvas.style.height = px + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var n = this.engine.size;
    this.pad = px * 0.06 + 8;          // 邊距（留座標）
    this.grid = (px - this.pad * 2) / (n - 1);
    this.stoneR = this.grid * 0.46;
    this.draw();
  };

  BoardRenderer.prototype._bindEvents = function () {
    var self = this;
    this.canvas.addEventListener('click', function (e) {
      var p = self._eventToGrid(e);
      if (p && self.pointCb) self.pointCb(p.x, p.y);
    });
    this.canvas.addEventListener('mousemove', function (e) {
      if (self.eink) return;  // 墨水模式不做落子預覽，避免移動時不斷重繪殘影
      var p = self._eventToGrid(e);
      var changed = (!!p !== !!self.ghost) ||
        (p && self.ghost && (p.x !== self.ghost.x || p.y !== self.ghost.y));
      self.ghost = p;
      if (changed) self.draw();
    });
    this.canvas.addEventListener('mouseleave', function () {
      if (self.ghost) { self.ghost = null; self.draw(); }
    });
  };

  BoardRenderer.prototype._eventToGrid = function (e) {
    var rect = this.canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var gx = Math.round((mx - this.pad) / this.grid);
    var gy = Math.round((my - this.pad) / this.grid);
    if (gx < 0 || gy < 0 || gx >= this.engine.size || gy >= this.engine.size) return null;
    // 只在靠近格點時有效
    var cx = this.pad + gx * this.grid;
    var cy = this.pad + gy * this.grid;
    if (Math.hypot(mx - cx, my - cy) > this.grid * 0.5) return null;
    return { x: gx, y: gy };
  };

  BoardRenderer.prototype.onPoint = function (cb) { this.pointCb = cb; };
  BoardRenderer.prototype.setMarks = function (arr) { this.marks = arr || []; this.draw(); };

  BoardRenderer.prototype._starPoints = function () {
    var n = this.engine.size;
    if (n === 13) return [[3, 3], [9, 3], [6, 6], [3, 9], [9, 9]];
    if (n === 9) return [[2, 2], [6, 2], [4, 4], [2, 6], [6, 6]];
    if (n === 19) return [[3, 3], [9, 3], [15, 3], [3, 9], [9, 9], [15, 9], [3, 15], [9, 15], [15, 15]];
    return [];
  };

  BoardRenderer.prototype.cx = function (x) { return this.pad + x * this.grid; };
  BoardRenderer.prototype.cy = function (y) { return this.pad + y * this.grid; };

  BoardRenderer.prototype.draw = function () {
    var ctx = this.ctx, n = this.engine.size, px = this.pixel;

    // 底色（墨水模式：純白平面，無漸層）
    if (this.eink) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, px, px);
    } else {
      var g = ctx.createLinearGradient(0, 0, px, px);
      g.addColorStop(0, '#f5c877');
      g.addColorStop(1, '#e8a94e');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, px, px);
    }

    var lineColor = this.eink ? '#000000' : '#5a3a1a';

    // 格線
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = this.eink ? 1.6 : 1.2;
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
      ctx.moveTo(this.cx(0), this.cy(i)); ctx.lineTo(this.cx(n - 1), this.cy(i));
      ctx.moveTo(this.cx(i), this.cy(0)); ctx.lineTo(this.cx(i), this.cy(n - 1));
    }
    ctx.stroke();

    // 座標標示（A.. / 1..）
    ctx.fillStyle = this.eink ? '#000000' : '#6b4a24';
    ctx.font = Math.max(9, this.grid * 0.32) + 'px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var letters = 'ABCDEFGHJKLMNOPQRST';
    for (var c = 0; c < n; c++) {
      ctx.fillText(letters[c], this.cx(c), this.pad - this.grid * 0.55);
      ctx.fillText(String(n - c), this.pad - this.grid * 0.6, this.cy(c));
    }

    // 星位
    var stars = this._starPoints();
    ctx.fillStyle = lineColor;
    for (var s = 0; s < stars.length; s++) {
      ctx.beginPath();
      ctx.arc(this.cx(stars[s][0]), this.cy(stars[s][1]), Math.max(2.5, this.grid * 0.08), 0, Math.PI * 2);
      ctx.fill();
    }

    // 落子預覽
    if (this.ghost && this.engine.get(this.ghost.x, this.ghost.y) === EMPTY) {
      this._drawStone(this.ghost.x, this.ghost.y, this.engine.turn, 0.35);
    }

    // 棋子
    for (var y = 0; y < n; y++) {
      for (var x = 0; x < n; x++) {
        var v = this.engine.board[y][x];
        if (v !== EMPTY) this._drawStone(x, y, v, 1);
      }
    }

    // 最後一手標記
    var lm = this.engine.lastMove;
    if (lm) {
      if (this.eink) {
        // 墨水：在棋子中央畫與棋子相反色的實心小方塊，高對比不靠顏色
        ctx.fillStyle = lm.color === BLACK ? '#ffffff' : '#000000';
        var hs = this.stoneR * 0.32;
        ctx.fillRect(this.cx(lm.x) - hs, this.cy(lm.y) - hs, hs * 2, hs * 2);
      } else {
        ctx.strokeStyle = '#ff5252';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(this.cx(lm.x), this.cy(lm.y), this.stoneR * 0.5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // 練習標記
    for (var m = 0; m < this.marks.length; m++) this._drawMark(this.marks[m]);
  };

  BoardRenderer.prototype._drawStone = function (x, y, color, alpha) {
    var ctx = this.ctx, cx = this.cx(x), cy = this.cy(y), r = this.stoneR;

    // 墨水模式：實心黑棋 / 白棋為白底粗黑框，無陰影無漸層
    if (this.eink) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      if (color === BLACK) {
        ctx.fillStyle = '#000000';
        ctx.fill();
      } else {
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.lineWidth = Math.max(2, r * 0.2);
        ctx.strokeStyle = '#000000';
        ctx.stroke();
      }
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    // 陰影
    ctx.beginPath();
    ctx.arc(cx + 1.5, cy + 2, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();
    // 立體漸層
    var rg = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.35, r * 0.1, cx, cy, r);
    if (color === BLACK) { rg.addColorStop(0, '#666'); rg.addColorStop(1, '#111'); }
    else { rg.addColorStop(0, '#fff'); rg.addColorStop(1, '#cfcfcf'); }
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = rg;
    ctx.fill();
    ctx.restore();
  };

  BoardRenderer.prototype._drawMark = function (m) {
    var ctx = this.ctx, cx = this.cx(m.x), cy = this.cy(m.y), r = this.stoneR * 0.6;
    var dflt = this.eink ? '#000000' : '#ff3b3b';
    ctx.save();
    ctx.lineWidth = this.eink ? 3.5 : 3;
    ctx.strokeStyle = m.color || dflt;
    ctx.fillStyle = m.color || dflt;
    if (m.type === 'circle') {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    } else if (m.type === 'square') {
      ctx.strokeRect(cx - r, cy - r, r * 2, r * 2);
    } else if (m.type === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(cx, cy - r); ctx.lineTo(cx - r, cy + r * 0.8); ctx.lineTo(cx + r, cy + r * 0.8);
      ctx.closePath(); ctx.stroke();
    } else if (m.type === 'dot') {
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2); ctx.fill();
    } else if (m.type === 'text') {
      ctx.fillStyle = m.color || '#ff3b3b';
      ctx.font = 'bold ' + (this.grid * 0.5) + 'px system-ui';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(m.text, cx, cy);
    }
    ctx.restore();
  };

  global.BoardRenderer = BoardRenderer;
})(window);

</script>
  <script>
/* 低段位電腦對手 —— 啟發式，故意「不太強」讓兒童有成就感
   策略優先序：
   1. 能吃掉對方（提子）就吃，優先吃多的
   2. 自己被打吃(剩 1 氣)就逃 / 或反提
   3. 避免自填(下了自己剩 1 氣的笨手)
   4. 靠近最後一手或己方棋子附近落子
   5. 隨機（偏中央） */

(function (global) {
  'use strict';

  var EMPTY = 0;

  function GoAI(engine, strength) {
    this.engine = engine;
    this.strength = (strength == null) ? 2 : strength;  // 0(最弱)~5(最強)
  }

  GoAI.prototype.setStrength = function (s) {
    this.strength = s;
  };

  // 計算「若在 (x,y) 落子後，自己這塊的氣」
  function selfLibertiesAfter(engine, x, y, color) {
    engine.board[y][x] = color;
    // 先移除被提的敵子以正確計氣
    var opp = engine.opponent(color);
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    var removed = [];
    for (var i = 0; i < 4; i++) {
      var nx = x + dirs[i][0], ny = y + dirs[i][1];
      if (!engine.inBounds(nx, ny)) continue;
      if (engine.board[ny][nx] === opp) {
        var g = engine.groupAndLiberties(nx, ny);
        if (g.liberties === 0) {
          for (var j = 0; j < g.stones.length; j++) {
            removed.push(g.stones[j]);
            engine.board[g.stones[j].y][g.stones[j].x] = EMPTY;
          }
        }
      }
    }
    var libs = engine.groupAndLiberties(x, y).liberties;
    // 還原
    engine.board[y][x] = EMPTY;
    for (var k = 0; k < removed.length; k++) {
      engine.board[removed[k].y][removed[k].x] = opp;
    }
    return libs;
  }

  GoAI.prototype.chooseMove = function (color) {
    var e = this.engine;
    var moves = e.legalMoves(color);
    if (!moves.length) return null;

    var opp = e.opponent(color);
    var s = this.strength;                 // 0~5
    // 強度越高：越信任棋理、越少亂下、吃子/打吃看得越重
    var smartW = 0.3 + 0.14 * s;           // 棋理權重
    var noiseAmp = (5 - s) * 1.6 + 0.5;    // 隨機幅度（越弱越亂）
    var capW = 4 + s * 2;                  // 吃子權重（弱手常錯過吃子）
    var atariW = 1 + s * 1.2;              // 打吃權重
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    // 高段(>=3)：先找出己方被打吃(剩1氣)的群，之後會嘗試救活
    var ataried = [];
    if (s >= 3) {
      var seen = {};
      for (var yy = 0; yy < e.size; yy++) {
        for (var xx = 0; xx < e.size; xx++) {
          if (e.board[yy][xx] === color && !seen[xx + ',' + yy]) {
            var gg = e.groupAndLiberties(xx, yy);
            for (var q = 0; q < gg.stones.length; q++) seen[gg.stones[q].x + ',' + gg.stones[q].y] = true;
            if (gg.liberties === 1) ataried.push(gg);
          }
        }
      }
    }

    var best = [];
    var bestScore = -Infinity;
    var center = (e.size - 1) / 2;

    for (var i = 0; i < moves.length; i++) {
      var mv = moves[i];
      var smart = 0;

      // 吃子
      smart += mv.captured * capW;

      // 自身氣：避免自送打吃（入門 s<1 不懂，故較弱）
      var libs = selfLibertiesAfter(e, mv.x, mv.y, color);
      if (libs <= 1 && mv.captured === 0 && s >= 1) smart -= 8 + s;
      smart += Math.min(libs, 4) * 1.2;

      // 打吃對方 / 貼近互動
      e.board[mv.y][mv.x] = color;
      for (var d = 0; d < 4; d++) {
        var nx = mv.x + dirs[d][0], ny = mv.y + dirs[d][1];
        if (!e.inBounds(nx, ny)) continue;
        if (e.board[ny][nx] === opp) {
          var og = e.groupAndLiberties(nx, ny);
          if (og.liberties === 1) smart += atariW * 4;
        }
        if (e.board[ny][nx] !== EMPTY) smart += 0.8;
      }
      e.board[mv.y][mv.x] = EMPTY;

      // 高段：救自己被打吃的群
      if (s >= 3 && ataried.length) {
        for (var a = 0; a < ataried.length; a++) {
          var adj = false;
          for (var p = 0; p < ataried[a].stones.length; p++) {
            var st = ataried[a].stones[p];
            if (Math.abs(st.x - mv.x) + Math.abs(st.y - mv.y) === 1) { adj = true; break; }
          }
          if (adj && selfLibertiesAfter(e, mv.x, mv.y, color) >= 2) smart += 6 + s;
        }
      }

      // 偏好中央
      var distC = Math.abs(mv.x - center) + Math.abs(mv.y - center);
      smart += (e.size - distC) * 0.15;

      var score = smart * smartW + Math.random() * noiseAmp;
      if (score > bestScore) { bestScore = score; best = [mv]; }
      else if (score === bestScore) best.push(mv);
    }

    return best[Math.floor(Math.random() * best.length)];
  };

  global.GoAI = GoAI;
})(window);

</script>
  <script>
/* 解說教學 —— 純規則分析盤面，產生白話解說（不需 LLM、不連網）
   對外：window.Teach.commentMove(engine, x, y, color, captured) → { icon, text }
   分析「剛下在 (x,y) 的一手」的戰術意義。engine 需為落子後狀態。 */

(function (global) {
  'use strict';

  var EMPTY = 0, B = 1, W = 2;
  var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

  function opp(c) { return c === B ? W : B; }

  function commentMove(engine, x, y, color, captured) {
    var o = opp(color);
    var atari = false;        // 是否打吃到對方
    var friendly = 0;         // 相鄰己方棋子數
    var enemyAdj = 0;         // 相鄰對方棋子數

    for (var i = 0; i < 4; i++) {
      var nx = x + dirs[i][0], ny = y + dirs[i][1];
      if (!engine.inBounds(nx, ny)) continue;
      var v = engine.get(nx, ny);
      if (v === color) {
        friendly++;
      } else if (v === o) {
        enemyAdj++;
        var g = engine.groupAndLiberties(nx, ny);
        if (g.liberties === 1) atari = true;
      }
    }

    var myLibs = engine.get(x, y) === EMPTY ? 0 : engine.groupAndLiberties(x, y).liberties;

    if (captured > 0) {
      return { icon: '🎉', text: '提子 ' + captured + ' 顆！對方那塊棋沒有氣了，就被拿走。' };
    }
    if (atari) {
      return { icon: '⚠️', text: '打吃！讓對方只剩最後 1 口氣，下一手就可能把它吃掉。' };
    }
    if (myLibs === 1) {
      return { icon: '😮', text: '小心，這手自己只剩 1 口氣，容易被對方反過來吃掉。' };
    }
    if (friendly >= 2) {
      return { icon: '💪', text: '連接：把附近幾顆棋接成更強的一塊，不容易被切斷。' };
    }
    if (friendly === 1) {
      return { icon: '➡️', text: '延伸：讓自己的棋變長、氣變多，比較安全。' };
    }
    if (enemyAdj > 0) {
      return { icon: '⚔️', text: '貼著對方下，開始跟它搶氣、逼近它。' };
    }
    return { icon: '🗺️', text: '先在空曠的地方佔一塊地盤，把勢力範圍圍大。' };
  }

  global.Teach = { commentMove: commentMove };
})(window);

</script>
  <script>
/* 過關誇張特效 —— 彩帶爆炸 + 星星煙火 + 大字橫幅 + 震動 + 叮咚音效
   全部純前端、免網路。對外：window.FX.celebrate({ big: false, text: '過關囉！' }) */

(function (global) {
  'use strict';

  var canvas, ctx, particles = [], running = false, banner;
  var COLORS = ['#ff5252', '#ffb300', '#ffe14d', '#43d17a', '#4aa3ff', '#b06bff', '#ff7bd5', '#ff8a3d'];
  var EMOJIS = ['⭐', '🎉', '✨', '🎈', '🌟', '🏆'];

  function ensureCanvas() {
    if (canvas) return;
    canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;left:0;top:0;width:100%;height:100%;' +
      'pointer-events:none;z-index:9998;';
    document.body.appendChild(canvas);
    ctx = canvas.getContext('2d');
    resize();
    global.addEventListener('resize', resize);
  }

  function resize() {
    if (!canvas) return;
    var dpr = global.devicePixelRatio || 1;
    canvas.width = global.innerWidth * dpr;
    canvas.height = global.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  // 從某點放射爆開
  function burst(cx, cy, count, power) {
    for (var i = 0; i < count; i++) {
      var ang = rand(0, Math.PI * 2);
      var spd = rand(3, power);
      var isEmoji = Math.random() < 0.22;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - rand(2, 6),
        g: rand(0.12, 0.26),
        rot: rand(0, Math.PI * 2),
        vr: rand(-0.3, 0.3),
        life: 0, maxLife: rand(70, 120),
        size: isEmoji ? rand(18, 30) : rand(6, 13),
        color: COLORS[(Math.random() * COLORS.length) | 0],
        emoji: isEmoji ? EMOJIS[(Math.random() * EMOJIS.length) | 0] : null,
        shape: Math.random() < 0.5 ? 'rect' : 'circle'
      });
    }
  }

  // 從頂端落下的彩帶雨
  function rain(count) {
    var w = global.innerWidth;
    for (var i = 0; i < count; i++) {
      particles.push({
        x: rand(0, w), y: rand(-60, -10),
        vx: rand(-1.5, 1.5), vy: rand(2, 5),
        g: rand(0.02, 0.06),
        rot: rand(0, Math.PI * 2), vr: rand(-0.25, 0.25),
        life: 0, maxLife: rand(120, 200),
        size: rand(7, 14),
        color: COLORS[(Math.random() * COLORS.length) | 0],
        emoji: null,
        shape: Math.random() < 0.5 ? 'rect' : 'circle',
        sway: rand(0.02, 0.06), swayPhase: rand(0, 6)
      });
    }
  }

  function loop() {
    ctx.clearRect(0, 0, global.innerWidth, global.innerHeight);
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.life++;
      p.vy += p.g;
      if (p.sway) p.x += Math.sin((p.life * p.sway) + p.swayPhase) * 1.2;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      var alpha = p.life > p.maxLife - 25 ? Math.max(0, (p.maxLife - p.life) / 25) : 1;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      if (p.emoji) {
        ctx.font = p.size + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.emoji, 0, 0);
      } else if (p.shape === 'rect') {
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      if (p.life >= p.maxLife || p.y > global.innerHeight + 40) particles.splice(i, 1);
    }
    if (particles.length) requestAnimationFrame(loop);
    else { running = false; ctx.clearRect(0, 0, global.innerWidth, global.innerHeight); }
  }

  function start() {
    if (!running) { running = true; requestAnimationFrame(loop); }
  }

  // 中央大字橫幅：彈跳登場後淡出
  function showBanner(text, big) {
    if (banner && banner.parentNode) banner.parentNode.removeChild(banner);
    banner = document.createElement('div');
    banner.className = 'fx-banner' + (big ? ' big' : '');
    banner.innerHTML = text;
    document.body.appendChild(banner);
    // 觸發動畫
    void banner.offsetWidth;
    banner.classList.add('show');
    var b = banner;
    setTimeout(function () { b.classList.add('out'); }, big ? 2000 : 1200);
    setTimeout(function () { if (b.parentNode) b.parentNode.removeChild(b); }, big ? 2800 : 1900);
  }

  // 叮咚音效（WebAudio，免檔案）
  var actx;
  function chime(big) {
    try {
      actx = actx || new (global.AudioContext || global.webkitAudioContext)();
      var notes = big ? [523, 659, 784, 1047, 1319] : [659, 784, 1047];
      var t0 = actx.currentTime;
      notes.forEach(function (f, i) {
        var o = actx.createOscillator();
        var g = actx.createGain();
        o.type = 'triangle';
        o.frequency.value = f;
        var st = t0 + i * 0.09;
        g.gain.setValueAtTime(0.0001, st);
        g.gain.exponentialRampToValueAtTime(0.25, st + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, st + 0.35);
        o.connect(g); g.connect(actx.destination);
        o.start(st); o.stop(st + 0.4);
      });
    } catch (e) { /* 靜音環境忽略 */ }
  }

  // 震動某元素
  function shake(el, big) {
    if (!el) return;
    var cls = big ? 'fx-shake-big' : 'fx-shake';
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
    setTimeout(function () { el.classList.remove(cls); }, big ? 700 : 450);
  }

  // 吃子小噴發：在螢幕座標 (sx,sy) 噴出一小撮彩帶
  function miniBurst(sx, sy, count) {
    ensureCanvas();
    count = count || 14;
    for (var i = 0; i < count; i++) {
      var ang = rand(0, Math.PI * 2);
      var spd = rand(2, 7);
      var isEmoji = Math.random() < 0.15;
      particles.push({
        x: sx, y: sy,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - rand(0, 3),
        g: rand(0.12, 0.22),
        rot: rand(0, Math.PI * 2), vr: rand(-0.3, 0.3),
        life: 0, maxLife: rand(28, 52),
        size: isEmoji ? rand(14, 20) : rand(5, 10),
        color: COLORS[(Math.random() * COLORS.length) | 0],
        emoji: isEmoji ? '✨' : null,
        shape: Math.random() < 0.5 ? 'rect' : 'circle'
      });
    }
    start();
  }

  // 吃子「啵」音效
  function pop() {
    try {
      actx = actx || new (global.AudioContext || global.webkitAudioContext)();
      var o = actx.createOscillator();
      var g = actx.createGain();
      o.type = 'sine';
      var t = actx.currentTime;
      o.frequency.setValueAtTime(880, t);
      o.frequency.exponentialRampToValueAtTime(280, t + 0.12);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.3, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t + 0.18);
    } catch (e) { /* 靜音環境忽略 */ }
  }

  function celebrate(opts) {
    opts = opts || {};
    ensureCanvas();
    var cx = global.innerWidth / 2;
    var cy = global.innerHeight * 0.42;

    if (opts.big) {
      burst(cx, cy, 160, 16);
      rain(120);
      // 兩側再各補一炮
      setTimeout(function () { burst(cx * 0.4, cy, 80, 13); burst(cx * 1.6, cy, 80, 13); start(); }, 220);
      showBanner(opts.text || '🏆 全部通關！🏆<br><span class="sub">澂澂好棒！</span>', true);
    } else {
      burst(cx, cy, 90, 13);
      rain(50);
      showBanner(opts.text || '🎉 過關囉！ ⭐', false);
    }
    start();
    chime(!!opts.big);
    shake(opts.shakeEl, !!opts.big);
  }

  global.FX = { celebrate: celebrate, miniBurst: miniBurst, pop: pop };
})(window);

</script>
  <script>
/* 對戰模式 —— 支援「雙人對戰」與「對電腦(低段位)」
   功能：輪流落子、顯示提子數、悔棋、虛手(Pass)、認輸、重新開始、終局粗略數子 */

(function (global) {
  'use strict';

  var B = 1, W = 2;

  // 對手等級：strength 0~5，附換算級/段標籤
  var LEVELS = [
    { strength: 0, label: '入門（約 20 級）' },
    { strength: 1, label: '初學（約 15 級）' },
    { strength: 2, label: '初級（約 10 級）' },
    { strength: 3, label: '中級（約 5 級）' },
    { strength: 4, label: '高級（約 1 級）' },
    { strength: 5, label: '高手（約 1 段）' }
  ];

  // 13 路讓子星位（依讓子數擺放）
  var HANDICAP_POINTS = {
    2: [[9, 3], [3, 9]],
    4: [[3, 3], [9, 3], [3, 9], [9, 9]],
    6: [[3, 3], [9, 3], [3, 9], [9, 9], [3, 6], [9, 6]],
    9: [[3, 3], [9, 3], [3, 9], [9, 9], [3, 6], [9, 6], [6, 3], [6, 9], [6, 6]]
  };

  function VsController(ui) {
    this.ui = ui;
    this.engine = new global.GoEngine(13);
    this.renderer = new global.BoardRenderer(ui.canvas, this.engine, { eink: !!ui.eink });
    this.level = ui.levelSel ? parseInt(ui.levelSel.value, 10) : 1;
    this.ai = new global.GoAI(this.engine, LEVELS[this.level].strength);
    this.handicap = ui.handicapSel ? parseInt(ui.handicapSel.value, 10) : 0;
    this.teachOff = ui.teachToggle ? !ui.teachToggle.checked : false;
    this.mode = 'ai';        // 'ai' | 'human'
    this.aiColor = W;        // 電腦執白，玩家執黑先
    this.gameOver = false;
    this.thinking = false;

    var self = this;
    this.renderer.onPoint(function (x, y) { self.handleClick(x, y); });
    this.bind();
    this.restart();
  }

  VsController.prototype.bind = function () {
    var self = this, ui = this.ui;
    ui.modeSel.addEventListener('change', function () {
      self.mode = ui.modeSel.value;
      self.restart();
    });
    if (ui.levelSel) {
      ui.levelSel.addEventListener('change', function () {
        self.level = parseInt(ui.levelSel.value, 10);
        self.ai.setStrength(LEVELS[self.level].strength);
        self.restart();
      });
    }
    if (ui.handicapSel) {
      ui.handicapSel.addEventListener('change', function () {
        self.handicap = parseInt(ui.handicapSel.value, 10);
        self.restart();
      });
    }
    if (ui.teachToggle) {
      ui.teachToggle.addEventListener('change', function () {
        self.teachOff = !ui.teachToggle.checked;
        if (self.teachOff && ui.teachEl) ui.teachEl.textContent = '';
      });
    }
    ui.undoBtn.addEventListener('click', function () { self.undo(); });
    ui.passBtn.addEventListener('click', function () { self.pass(); });
    ui.resignBtn.addEventListener('click', function () { self.resign(); });
    ui.restartBtn.addEventListener('click', function () { self.restart(); });
  };

  VsController.prototype.restart = function () {
    this.engine.reset();
    this.gameOver = false;
    this.thinking = false;
    this.ui.scoreEl.textContent = '';
    if (this.ui.teachEl) this.ui.teachEl.textContent = '';

    // 讓子（僅對電腦時生效）：黑先擺讓子，之後白(電腦)先下
    var handInfo = '';
    if (this.mode === 'ai' && this.handicap > 0 && HANDICAP_POINTS[this.handicap]) {
      var pts = HANDICAP_POINTS[this.handicap];
      for (var i = 0; i < pts.length; i++) this.engine.board[pts[i][1]][pts[i][0]] = B;
      this.engine.turn = W;
      handInfo = '（讓 ' + this.handicap + ' 子）';
    }

    this.renderer.draw();
    this.refresh();

    if (this.mode === 'ai') {
      this.setStatus('對手：' + LEVELS[this.level].label + handInfo + '　開始對局！', '');
      if (this.isAiTurn()) { this.aiMove(); return; }

  };

  VsController.prototype.refresh = function () {
    var e = this.engine;
    this.ui.turnEl.textContent = e.turn === B ? '⚫ 黑棋' : '⚪ 白棋';
    this.ui.capBlackEl.textContent = e.captures[B];

    this.ui.undoBtn.disabled = this.gameOver || !e.history.length;
  };

  VsController.prototype.setStatus = function (text, cls) {
    this.ui.statusEl.textContent = text;
    this.ui.statusEl.className = 'status ' + (cls || '');
  };

  VsController.prototype.isAiTurn = function () {
    return this.mode === 'ai' && this.engine.turn === this.aiColor;
  };

  VsController.prototype.handleClick = function (x, y) {
    if (this.gameOver || this.thinking) return;
    if (this.isAiTurn()) return;   // 電腦回合不接受點擊

    var res = this.engine.play(x, y);
    if (!res.legal) {
      this.setStatus('這裡不能下（' + reasonText(res.reason) + '）', 'warn');
      return;
    }
    this.renderer.draw();
    this.afterMove(res, 'you');

    if (!this.gameOver && this.isAiTurn()) this.aiMove();
  };

  VsController.prototype.afterMove = function (res, who) {
    this.refresh();
    if (res.captured && res.captured.length) {
      this.setStatus('提子 ' + res.captured.length + ' 顆！', 'ok');
      this.captureFx(res.captured);
    } else {
      this.setStatus('', '');
    }
    this.showTeach(res.captured ? res.captured.length : 0, who);
  };

  // 解說：分析剛剛這一手的目的（你的或電腦的），顯示白話說明
  VsController.prototype.showTeach = function (captured, who) {
    var el = this.ui.teachEl;
    if (!el) return;
    if (this.teachOff || !global.Teach) { el.textContent = ''; return; }
    var lm = this.engine.lastMove;
    if (!lm) { el.textContent = ''; return; }
    var c = global.Teach.commentMove(this.engine, lm.x, lm.y, lm.color, captured);
    var subj = who === 'ai' ? '電腦這手 🤖' : '你這手 🙂';
    el.textContent = c.icon + ' ' + subj + '：' + c.text;
  };

  // 吃子小特效：每顆被提的棋位置噴一撮彩帶 + 啵一聲
  VsController.prototype.captureFx = function (caps) {
    if (!global.FX) return;
    var r = this.renderer;
    var rect = r.canvas.getBoundingClientRect();
    for (var i = 0; i < caps.length; i++) {
      global.FX.miniBurst(rect.left + r.cx(caps[i].x), rect.top + r.cy(caps[i].y), 14);
    }
    global.FX.pop();
  };

  VsController.prototype.aiMove = function () {
    var self = this;
    this.thinking = true;
    this.setStatus('電腦思考中… 🤖', '');
    setTimeout(function () {
      var mv = self.ai.chooseMove(self.aiColor);
      if (!mv) {
        self.thinking = false;
        self.pass();
        return;
      }
      var res = self.engine.play(mv.x, mv.y);
      self.renderer.draw();
      self.thinking = false;
      self.afterMove(res, 'ai');
    }, 450);
  };

  VsController.prototype.undo = function () {
    if (this.gameOver || this.thinking) return;
    // 對電腦時一次退兩手(退回玩家)，雙人退一手
    this.engine.undo();
    if (this.mode === 'ai' && this.engine.turn === this.aiColor) this.engine.undo();
    this.renderer.draw();
    this.refresh();
    this.setStatus('悔棋一步 ↩️', '');
  };

  VsController.prototype.pass = function () {
    if (this.gameOver || this.thinking) return;
    var ended = this.engine.pass();
    this.renderer.draw();
    this.refresh();
    if (ended) {
      this.endByScore('雙方虛手，對局結束');
    } else {
      this.setStatus((this.engine.turn === B ? '黑棋' : '白棋') + '回合（對方虛手 Pass）', '');
      if (this.isAiTurn()) this.aiMove();
    }
  };

  VsController.prototype.resign = function () {
    if (this.gameOver) return;
    var loser = this.engine.turn; // 認輸方視為當前回合方(由按鈕方主動)
    this.gameOver = true;
    var winner = loser === B ? '白棋 ⚪' : '黑棋 ⚫';
    this.setStatus('認輸！' + winner + '獲勝 🏆', 'ok');
    this.refresh();
  };

  VsController.prototype.endByScore = function (prefix) {
    this.gameOver = true;
    var s = this.engine.scoreEstimate();
    // 兒童版：黑不貼目，直接比大小
    var winner, diff;
    if (s.black > s.white) { winner = '黑棋 ⚫'; diff = s.black - s.white; }
    else if (s.white > s.black) { winner = '白棋 ⚪'; diff = s.white - s.black; }
    else { winner = null; }
    var txt = prefix + '｜黑 ' + s.black + ' vs 白 ' + s.white + '。';
    if (winner) txt += winner + '贏 ' + diff + ' 子 🏆';
    else txt += '平手！';
    this.ui.scoreEl.textContent = '（粗估：黑地 ' + s.blackTerritory + '、白地 ' + s.whiteTerritory + '）';
    this.setStatus(txt, 'ok');
    this.refresh();
  };

  function reasonText(r) {
    return { occupied: '已有棋子', ko: '打劫不能馬上提回', suicide: '會沒有氣', out: '出界' }[r] || '不行';
  }

  global.VsController = VsController;
})(window);

  var STORE_KEY = 'chengcheng-go-stars';

  function PracticeController(ui) {

  // ---- 進度存檔（localStorage，換頁/關掉重開都記得） ----
  PracticeController.prototype.loadStore = function () {
    try { return JSON.parse(global.localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { return {}; }
  };
  PracticeController.prototype.saveStore = function () {
    try { global.localStorage.setItem(STORE_KEY, JSON.stringify(this.store)); }
    catch (e) { /* 無痕模式等情況忽略 */ }
  };
  PracticeController.prototype.starCount = function () {
    var n = 0;
    for (var i = 0; i < PROBLEMS.length; i++) if (this.store[PROBLEMS[i].id]) n++;
    return n;
  };
  PracticeController.prototype.firstUnsolved = function () {
    for (var i = 0; i < PROBLEMS.length; i++) if (!this.store[PROBLEMS[i].id]) return i;
    return 0;
  };

  // ---- 星星列：每關一顆，過關亮金星，可點擊跳關 ----
  PracticeController.prototype.renderStars = function () {
    var el = this.ui.starsEl;
    if (!el) return;
    el.innerHTML = '';
    var self = this;
    for (var i = 0; i < PROBLEMS.length; i++) {
      var s = document.createElement('button');
      var done = !!this.store[PROBLEMS[i].id];
      s.className = 'star' + (done ? ' done' : '') + (i === this.index ? ' current' : '');
      s.textContent = done ? (this.ui.eink ? '★' : '⭐') : (i + 1);
      s.title = PROBLEMS[i].title;
      (function (idx) { s.addEventListener('click', function () { self.load(idx); }); })(i);
      el.appendChild(s);
    }
  };

  PracticeController.prototype.bind = function () {
    var self = this, ui = this.ui;
    ui.prevBtn.addEventListener('click', function () { self.load(self.index - 1); });
    ui.nextBtn.addEventListener('click', function () { self.load(self.index + 1); });
    ui.retryBtn.addEventListener('click', function () { self.load(self.index); });
    if (ui.resetBtn) {
      ui.resetBtn.addEventListener('click', function () {
        if (!global.confirm('確定要清除所有星星，重新挑戰嗎？')) return;
        self.store = {};
        self.saveStore();
        self.load(0);
      });
    }
  };

  PracticeController.prototype.load = function (i) {
    if (i < 0) i = 0;
    if (i >= PROBLEMS.length) i = PROBLEMS.length - 1;
    this.index = i;
    this.solved = false;
    var p = PROBLEMS[i];
    this.engine.setup(p.stones, p.turn);
    this.renderer.setMarks(p.marks || []);
    this.renderer.draw();

    this.ui.titleEl.textContent = p.title;
    this.ui.descEl.textContent = p.desc;
    this.ui.hintEl.textContent = '';
    this.ui.hintEl.classList.remove('show');
    if (this.ui.teachEl) this.ui.teachEl.textContent = '';
    if (this.store[p.id]) {
      this.setStatus('⭐ 這一關已經通過囉！想再玩一次就直接下正解 👆', 'ok');
    } else {
      this.setStatus('輪到你（黑棋），點棋盤下一手 👆', '');
    }
    this.ui.progressEl.textContent = '第 ' + (i + 1) + ' / ' + PROBLEMS.length + ' 關　⭐ 已得 ' + this.starCount() + ' 顆星';
    this.ui.prevBtn.disabled = (i === 0);
    this.ui.nextBtn.disabled = (i === PROBLEMS.length - 1);
    this.renderStars();
  };

  PracticeController.prototype.setStatus = function (text, cls) {
    var el = this.ui.statusEl;
    el.textContent = text;
    el.className = 'status ' + (cls || '');
  };

  PracticeController.prototype.handleClick = function (x, y) {
    if (this.solved) return;
    var p = PROBLEMS[this.index];
    var isSolution = p.solutions.some(function (s) { return s.x === x && s.y === y; });

    var res = this.engine.play(x, y);
    if (!res.legal) {
      this.setStatus('這裡不能下喔（' + reasonText(res.reason) + '），換一個點試試 🙂', 'warn');
      return;
    }
    this.renderer.setMarks([]);
    this.renderer.draw();

    if (isSolution) {
      this.solved = true;
      var newStar = !this.store[p.id];
      this.store[p.id] = true;
      this.saveStore();
      this.renderStars();
      var got = this.starCount();
      var msg = '🎉 答對了！' + (res.captured.length ? '成功吃掉 ' + res.captured.length + ' 顆白棋！' : '漂亮的一手！');
      if (newStar) msg += ' ⭐ 得到一顆星（' + got + '/' + PROBLEMS.length + '）';
      var allClear = (got === PROBLEMS.length);
      if (allClear) msg = '🏆 全部 ' + PROBLEMS.length + ' 關都通關了！澂澂好棒！🎉';
      this.setStatus(msg, 'ok');
      this.ui.progressEl.textContent = '第 ' + (this.index + 1) + ' / ' + PROBLEMS.length + ' 關　⭐ 已得 ' + got + ' 顆星';
      if (this.ui.teachEl && TEACH[p.id]) {
        this.ui.teachEl.textContent = '📖 這一步的目的：' + TEACH[p.id];
      }
      celebrate(this.ui.canvas);
      // 誇張過關特效
      var wrap = this.ui.canvas.parentNode;
      if (global.FX) {
        if (allClear) {
          global.FX.celebrate({ big: true, shakeEl: wrap });
        } else {
          global.FX.celebrate({ text: '🎉 第 ' + (this.index + 1) + ' 關 過關囉！ ⭐', shakeEl: wrap });
        }
      }
    } else {
      this.setStatus('差一點點～再想想看 💪', 'warn');
      this.ui.hintEl.textContent = '💡 提示：' + p.hint;
      this.ui.hintEl.classList.add('show');
      // 讓小孩看到後果後可再試：短暫延遲後還原此手
      var self = this;
      setTimeout(function () {
        self.engine.undo();
        self.renderer.setMarks(p.marks || []);
        self.renderer.draw();
      }, 900);
    }
  };

  function reasonText(r) {
    return { occupied: '已經有棋子', ko: '打劫暫時不能下', suicide: '會沒有氣', out: '超出棋盤' }[r] || '不行';
  }

  function celebrate(canvas) {
    canvas.classList.remove('celebrate');
    void canvas.offsetWidth;
    canvas.classList.add('celebrate');
  }

  global.PracticeController = PracticeController;
  global.GO_PROBLEMS = PROBLEMS;
})(window);

</script>
  <script>
    // 分頁切換
    var tabs = document.querySelectorAll('.tab');
    tabs.forEach(function (t) {
      t.addEventListener('click', function () {
        tabs.forEach(function (x) { x.classList.remove('active'); });
        t.classList.add('active');
        document.querySelectorAll('.page').forEach(function (p) { p.classList.remove('active'); });
        document.getElementById('page-' + t.dataset.page).classList.add('active');
      });
    });

    // 啟動對戰
    var vs = new VsController({
      canvas: document.getElementById('vs-canvas'),
      turnEl: document.getElementById('vs-turn'),
      capBlackEl: document.getElementById('vs-cap-black'),
      capWhiteEl: document.getElementById('vs-cap-white'),
      statusEl: document.getElementById('vs-status'),
      teachEl: document.getElementById('vs-teach'),
      teachToggle: document.getElementById('vs-teach-toggle'),
      scoreEl: document.getElementById('vs-score'),
      modeSel: document.getElementById('vs-mode'),
      levelSel: document.getElementById('vs-level'),
      handicapSel: document.getElementById('vs-handicap'),
      undoBtn: document.getElementById('vs-undo'),
      passBtn: document.getElementById('vs-pass'),
      resignBtn: document.getElementById('vs-resign'),
      restartBtn: document.getElementById('vs-restart')
    });

    // 啟動練習
    var practice = new PracticeController({
      canvas: document.getElementById('pr-canvas'),
      titleEl: document.getElementById('pr-title'),
      descEl: document.getElementById('pr-desc'),
      hintEl: document.getElementById('pr-hint'),
      statusEl: document.getElementById('pr-status'),
      teachEl: document.getElementById('pr-teach'),
      progressEl: document.getElementById('pr-progress'),
      starsEl: document.getElementById('pr-stars'),
      prevBtn: document.getElementById('pr-prev'),
      nextBtn: document.getElementById('pr-next'),
      retryBtn: document.getElementById('pr-retry'),
      resetBtn: document.getElementById('pr-reset')
    });
  </script>
