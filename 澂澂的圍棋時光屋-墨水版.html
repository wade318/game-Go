  <style>
/* 墨水閱讀器專用樣式：純黑白高對比、無漸層、無動畫、大字大按鈕
   適用 Kindle / Boox / reMarkable 等 e-ink 裝置 */

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  background: #ffffff;
  color: #000000;
  min-height: 100vh;
  font-size: 17px;
  line-height: 1.6;
}

header { text-align: center; padding: 16px 12px 4px; }
header h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; }
header h1 .go { color: #000; text-decoration: underline; }
header p { margin: 4px 0 0; font-size: 15px; }

/* 模式分頁 */
.tabs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 14px 0 8px;
  flex-wrap: wrap;
}
.tab {
  border: 2.5px solid #000;
  background: #fff;
  color: #000;
  font-size: 18px;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
}
.tab.active { background: #000; color: #fff; }

.page { display: none; padding: 8px 14px 30px; }
.page.active { display: block; }

.layout {
  display: flex;
  gap: 18px;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: wrap;
  max-width: 1000px;
  margin: 0 auto;
}

.board-wrap {
  background: #fff;
  padding: 8px;
  border: 3px solid #000;
  border-radius: 6px;
}
canvas {
  display: block;
  cursor: pointer;
  touch-action: manipulation;
  background: #fff;
}

/* 側欄面板 */
.panel {
  background: #fff;
  border: 3px solid #000;
  border-radius: 6px;
  padding: 16px;
  width: 320px;
}
.panel h2 { margin: 0 0 10px; font-size: 22px; }

.row { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }

.stat {
  flex: 1;
  background: #fff;
  border: 2px solid #000;
  border-radius: 6px;
  padding: 8px;
  text-align: center;
  min-width: 80px;
}
.stat .label { font-size: 13px; }
.stat .value { font-size: 24px; font-weight: 800; }

.turn-badge {
  text-align: center;
  font-size: 22px;
  font-weight: 800;
  background: #fff;
  border: 2px solid #000;
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 8px;
}

button.btn {
  border: 2.5px solid #000;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  color: #000;
  background: #fff;
  flex: 1;
  min-width: 80px;
}
/* 主要動作用實心黑，最醒目 */
button.btn.green { background: #000; color: #fff; }
button.btn.hint { background: #e6e6e6; border-style: dashed; }
button.btn:disabled { color: #999; border-color: #999; cursor: not-allowed; }
button.btn.reset { width: 100%; margin-top: 10px; font-size: 14px; }

select {
  width: 100%;
  padding: 11px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 2.5px solid #000;
  font-size: 16px;
  font-weight: 600;
  background: #fff;
  color: #000;
}

.status {
  min-height: 24px;
  margin-top: 12px;
  padding: 10px 12px;
  border: 2px solid #000;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 600;
  background: #fff;
}
/* 用邊框粗細＋底紋區分，不靠顏色 */
.status.ok { background: #fff; border-width: 3px; }
.status.warn { background: #eee; }

.score { margin-top: 8px; font-size: 14px; text-align: center; }

/* 解說框 */
.teach {
  margin-top: 10px;
  padding: 10px 12px;
  border: 2px solid #000;
  border-radius: 6px;
  background: #f2f2f2;
  color: #000;
  font-size: 15px;
  line-height: 1.6;
}
.teach:empty { display: none; }
.teach-toggle {
  display: block;
  margin-top: 8px;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
}

/* 覆盤導覽列 */
.replay-bar {
  margin-top: 12px;
  padding: 12px;
  border-radius: 6px;
  border: 3px solid #000;
  background: #fff;
}
.replay-info {
  font-size: 15px;
  line-height: 1.6;
  font-weight: 600;
  margin-bottom: 8px;
  min-height: 44px;
}
.replay-bar .btn { font-size: 14px; padding: 10px 6px; min-width: 56px; }

/* 練習頁 */
.prob-title { margin: 0 0 8px; font-size: 21px; font-weight: 800; }
.prob-desc { font-size: 16px; line-height: 1.7; }
.hint {
  margin-top: 10px;
  padding: 10px 12px;
  border: 2px dashed #000;
  border-radius: 6px;
  background: #fff;
  font-size: 15px;
  display: none;
}
.hint.show { display: block; }
.cat-select { font-weight: 700; margin-bottom: 6px; }
.progress { text-align: center; font-weight: 700; margin: 6px 0; font-size: 16px; }

/* 星星關卡列 */
.stars {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin: 8px 0 12px;
}
.star {
  width: 34px;
  height: 34px;
  border: 2px solid #000;
  border-radius: 50%;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  background: #fff;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.star.done { background: #000; color: #fff; }        /* 過關：實心黑底白星 */
.star.current { border-width: 4px; }                  /* 目前關：粗框 */

footer { text-align: center; font-size: 13px; padding: 10px; }
.switch-link {
  display: inline-block;
  margin-top: 6px;
  color: #000;
  font-weight: 800;
  text-decoration: underline;
}

/* 明確關閉任何可能殘留的動畫（墨水裝置不適合） */
canvas.celebrate { animation: none !important; }

</style>
</head>
<body>
  <header>
    <h1>澂澂的<span class="go">圍棋</span>時光屋</h1>
    <p>13 路棋盤 · 墨水閱讀器版（黑白高對比 · 無動畫）</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-page="vs">對戰</button>
    <button class="tab" data-page="practice">棋形練習</button>
  </div>

  <!-- ===== 對戰頁 ===== -->
  <section id="page-vs" class="page active">
    <div class="layout">
      <div class="board-wrap">
        <canvas id="vs-canvas" width="560" height="560"></canvas>
      </div>
      <div class="panel">
        <h2>對戰</h2>
        <select id="vs-mode">
          <option value="ai">我 vs 電腦（適合練習）</option>
          <option value="human">兩個人一起下</option>
        </select>
        <select id="vs-level" title="對手等級">
          <option value="0">入門（約 20 級）</option>
          <option value="1" selected>初學（約 15 級）</option>
          <option value="2">初級（約 10 級）</option>
          <option value="3">中級（約 5 級）</option>
          <option value="4">高級（約 1 級）</option>
          <option value="5">高手（約 1 段）</option>
        </select>
        <select id="vs-handicap" title="讓子">
          <option value="0" selected>不讓子（公平對局）</option>
          <option value="2">讓 2 子（我比較容易）</option>
          <option value="4">讓 4 子</option>
          <option value="6">讓 6 子</option>
          <option value="9">讓 9 子（最簡單）</option>
        </select>

        <div class="turn-badge">輪到：<span id="vs-turn">● 黑棋</span></div>

        <div class="row">
          <div class="stat">
            <div class="label">● 黑吃掉</div>
            <div class="value" id="vs-cap-black">0</div>
          </div>
          <div class="stat">
            <div class="label">○ 白吃掉</div>
            <div class="value" id="vs-cap-white">0</div>
          </div>
        </div>

        <div class="row">
          <button class="btn hint" id="vs-hint">提示一手</button>
          <button class="btn" id="vs-replay">覆盤</button>
        </div>
        <div class="row">
          <button class="btn gray" id="vs-undo">悔棋</button>
          <button class="btn" id="vs-pass">虛手</button>
        </div>
        <div class="row">
          <button class="btn red" id="vs-resign">認輸</button>
          <button class="btn green" id="vs-restart">重新開始</button>
        </div>

        <div class="status" id="vs-status"></div>
        <div class="teach" id="vs-teach"></div>
        <label class="teach-toggle"><input type="checkbox" id="vs-teach-toggle" checked> 顯示每手解說</label>
        <div class="score" id="vs-score"></div>

        <div class="replay-bar" id="vs-replay-bar" style="display:none">
          <div class="replay-info" id="vs-replay-info"></div>
          <div class="row">
            <button class="btn gray" id="vs-rp-first">⏮ 開頭</button>
            <button class="btn gray" id="vs-rp-prev">◀ 上一手</button>
            <button class="btn gray" id="vs-rp-next">下一手 ▶</button>
            <button class="btn gray" id="vs-rp-last">最後 ⏭</button>
          </div>
          <button class="btn red" id="vs-rp-exit">✖ 離開覆盤</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 練習頁 ===== -->
  <section id="page-practice" class="page">
    <div class="layout">
      <div class="board-wrap">
        <canvas id="pr-canvas" width="560" height="560"></canvas>
      </div>
      <div class="panel">
        <select id="pr-category" class="cat-select"></select>
        <div class="progress" id="pr-progress">進度 1 / 13</div>
        <div class="stars" id="pr-stars"></div>
        <h3 class="prob-title" id="pr-title">題目</h3>
        <p class="prob-desc" id="pr-desc">說明</p>
        <div class="hint" id="pr-hint"></div>
        <div class="status" id="pr-status"></div>
        <div class="teach" id="pr-teach"></div>
        <div class="row">
          <button class="btn gray" id="pr-prev">上一題</button>

  <script>
/* 圍棋規則核心引擎 —— 13 路棋盤
   負責：落子、氣的計算、提子、禁著點(自殺)、打劫(簡易 ko)
   不含任何畫面邏輯，方便對戰與練習共用 */

(function (global) {
  'use strict';

  var EMPTY = 0;
  var BLACK = 1;
  var WHITE = 2;

  function GoEngine(size) {
    this.size = size || 13;
    this.reset();
  }

  GoEngine.EMPTY = EMPTY;
  GoEngine.BLACK = BLACK;
  GoEngine.WHITE = WHITE;

  GoEngine.prototype.reset = function () {
    var n = this.size;
    this.board = [];
    for (var y = 0; y < n; y++) {
      var row = [];
      for (var x = 0; x < n; x++) row.push(EMPTY);
      this.board.push(row);
    }
    this.turn = BLACK;            // 黑先
    this.captures = { 1: 0, 2: 0 }; // 各方提子數
    this.koPoint = null;         // 打劫禁著點 {x,y}
    this.history = [];           // 每步快照，供悔棋
    this.lastMove = null;
    this.passes = 0;
    this.record = [];            // 覆盤用：每手後的盤面快照
    this.recordReset();
  };

  // 覆盤快照工具 ----------------------------------------------------
  GoEngine.prototype._frame = function (move, captured) {
    return {
      board: this.board.map(function (r) { return r.slice(); }),
      captures: { 1: this.captures[1], 2: this.captures[2] },
      lastMove: move,           // { x, y, color } 或 null（起手/虛手）
      captured: captured || 0,
      moveNo: this.record ? this.record.length : 0
    };
  };

  // 以「目前盤面」為第 0 手起點（讓子擺完後呼叫，含讓子）
  GoEngine.prototype.recordReset = function () {
    var f = this._frame(null, 0);
    f.moveNo = 0;
    this.record = [f];
  };

  GoEngine.prototype.inBounds = function (x, y) {
    return x >= 0 && y >= 0 && x < this.size && y < this.size;
  };

  GoEngine.prototype.get = function (x, y) {
    return this.board[y][x];
  };

  GoEngine.prototype.opponent = function (color) {
    return color === BLACK ? WHITE : BLACK;
  };

  // 取得某顆棋子所屬的整塊(相連同色) + 這塊的氣
  GoEngine.prototype.groupAndLiberties = function (x, y) {
    var color = this.board[y][x];
    var stones = [];
    var liberties = {};
    var seen = {};
    var stack = [[x, y]];
    seen[x + ',' + y] = true;
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    while (stack.length) {
      var cur = stack.pop();
      var cx = cur[0], cy = cur[1];
      stones.push({ x: cx, y: cy });
      for (var i = 0; i < 4; i++) {
        var nx = cx + dirs[i][0], ny = cy + dirs[i][1];
        if (!this.inBounds(nx, ny)) continue;
        var v = this.board[ny][nx];
        if (v === EMPTY) {
          liberties[nx + ',' + ny] = true;
        } else if (v === color && !seen[nx + ',' + ny]) {
          seen[nx + ',' + ny] = true;
          stack.push([nx, ny]);
        }
      }
    }
    return { stones: stones, liberties: Object.keys(liberties).length };
  };

  // 計算某座標若有棋子的氣數（不改動棋盤）
  GoEngine.prototype.libertiesAt = function (x, y) {
    if (this.board[y][x] === EMPTY) return 0;
    return this.groupAndLiberties(x, y).liberties;
  };

  // 試落子，回傳結果物件而不修改棋盤（供 AI / 練習判斷）
  // { legal, reason, captured:[{x,y}...] }
  GoEngine.prototype.tryPlay = function (x, y, color) {
    if (!this.inBounds(x, y)) return { legal: false, reason: 'out' };
    if (this.board[y][x] !== EMPTY) return { legal: false, reason: 'occupied' };
    if (this.koPoint && this.koPoint.x === x && this.koPoint.y === y) {
      return { legal: false, reason: 'ko' };
    }

    var opp = this.opponent(color);
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    // 暫放
    this.board[y][x] = color;
    var captured = [];
    var capKeys = {};

    // 檢查四鄰敵子是否被提
    for (var i = 0; i < 4; i++) {
      var nx = x + dirs[i][0], ny = y + dirs[i][1];
      if (!this.inBounds(nx, ny)) continue;
      if (this.board[ny][nx] === opp) {
        var g = this.groupAndLiberties(nx, ny);
        if (g.liberties === 0) {
          for (var j = 0; j < g.stones.length; j++) {
            var s = g.stones[j];
            var k = s.x + ',' + s.y;
            if (!capKeys[k]) { capKeys[k] = true; captured.push(s); }
          }
        }
      }
    }

    // 若沒提到子，檢查自己是否有氣（禁自殺）
    if (captured.length === 0) {
      var self = this.groupAndLiberties(x, y);
      if (self.liberties === 0) {
        this.board[y][x] = EMPTY; // 還原
        return { legal: false, reason: 'suicide' };
      }
    }

    this.board[y][x] = EMPTY; // 還原（tryPlay 不改棋盤）
    return { legal: true, captured: captured };
  };

  // 正式落子；成功回傳 true
  GoEngine.prototype.play = function (x, y) {
    var color = this.turn;
    var res = this.tryPlay(x, y, color);
    if (!res.legal) return res;

    this.pushHistory();

    var opp = this.opponent(color);
    this.board[y][x] = color;
    for (var i = 0; i < res.captured.length; i++) {
      var c = res.captured[i];
      this.board[c.y][c.x] = EMPTY;
    }
    this.captures[color] += res.captured.length;

    // 簡易打劫：只提 1 子、且自身也只有 1 氣時，設禁著點
    if (res.captured.length === 1) {
      var self = this.groupAndLiberties(x, y);
      if (self.liberties === 1 && self.stones.length === 1) {
        this.koPoint = { x: res.captured[0].x, y: res.captured[0].y };
      } else {
        this.koPoint = null;
      }
    } else {
      this.koPoint = null;
    }

    this.lastMove = { x: x, y: y, color: color };
    this.turn = opp;
    this.passes = 0;
    if (this.record) this.record.push(this._frame(this.lastMove, res.captured.length));
    return { legal: true, captured: res.captured };
  };

  GoEngine.prototype.pass = function () {
    this.pushHistory();
    this.koPoint = null;
    this.lastMove = null;
    var passColor = this.turn;
    this.passes += 1;
    this.turn = this.opponent(this.turn);
    if (this.record) {
      var f = this._frame(null, 0);
      f.pass = passColor;   // 記錄虛手方
      this.record.push(f);
    }
    return this.passes >= 2; // 連續兩 pass 即終局
  };

  GoEngine.prototype.pushHistory = function () {
    this.history.push({
      board: this.board.map(function (r) { return r.slice(); }),
      turn: this.turn,
      captures: { 1: this.captures[1], 2: this.captures[2] },
      koPoint: this.koPoint ? { x: this.koPoint.x, y: this.koPoint.y } : null,
      lastMove: this.lastMove
    });
  };

  GoEngine.prototype.undo = function () {
    if (!this.history.length) return false;
    var s = this.history.pop();
    this.board = s.board.map(function (r) { return r.slice(); });
    this.turn = s.turn;
    this.captures = { 1: s.captures[1], 2: s.captures[2] };
    this.koPoint = s.koPoint;
    this.lastMove = s.lastMove;
    this.passes = 0;
    if (this.record && this.record.length > 1) this.record.pop();
    return true;
  };

  // 找出所有合法落子點（給 AI 用）
  GoEngine.prototype.legalMoves = function (color) {
    var moves = [];
    for (var y = 0; y < this.size; y++) {
      for (var x = 0; x < this.size; x++) {
        if (this.board[y][x] !== EMPTY) continue;
        var r = this.tryPlay(x, y, color);
        if (r.legal) moves.push({ x: x, y: y, captured: r.captured.length });
      }
    }
    return moves;
  };

  // 簡易數子(面積法)：空點若只被單一顏色包圍算該方地
  // 兒童版粗略估算，回傳 { black, white }
  GoEngine.prototype.scoreEstimate = function () {
    var n = this.size;
    var visited = {};
    var territory = { 1: 0, 2: 0 };
    var stoneCount = { 1: 0, 2: 0 };
    var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    for (var y = 0; y < n; y++) {
      for (var x = 0; x < n; x++) {
        var v = this.board[y][x];
        if (v === BLACK) stoneCount[1]++;
        else if (v === WHITE) stoneCount[2]++;
        else {
          var key = x + ',' + y;
          if (visited[key]) continue;
          // flood fill 這塊空地
          var region = [];
          var borders = {};
          var stack = [[x, y]];
          visited[key] = true;
          while (stack.length) {
            var c = stack.pop();
            region.push(c);
            for (var i = 0; i < 4; i++) {
              var nx = c[0] + dirs[i][0], ny = c[1] + dirs[i][1];
              if (!this.inBounds(nx, ny)) continue;
              var nv = this.board[ny][nx];
              if (nv === EMPTY) {
                var nk = nx + ',' + ny;
                if (!visited[nk]) { visited[nk] = true; stack.push([nx, ny]); }
              } else {
                borders[nv] = true;
              }
            }
          }
          if (borders[BLACK] && !borders[WHITE]) territory[1] += region.length;
          else if (borders[WHITE] && !borders[BLACK]) territory[2] += region.length;
        }
      }
    }
    return {
      black: stoneCount[1] + territory[1],
      white: stoneCount[2] + territory[2],
      blackTerritory: territory[1],
      whiteTerritory: territory[2]
    };
  };

  // 由外部佈局（練習題用）：stones = [{x,y,color}], turn
  GoEngine.prototype.setup = function (stones, turn) {
    this.reset();
    for (var i = 0; i < stones.length; i++) {
      var s = stones[i];
      this.board[s.y][s.x] = s.color;
    }
    this.turn = turn || BLACK;
    this.history = [];
  };

  global.GoEngine = GoEngine;
})(window);

</script>
  <script>
/* Canvas 棋盤繪製器 —— 童趣木紋棋盤、立體棋子、星位、最後一手標記
   對外：new BoardRenderer(canvas, engine, options)
        .draw()           重繪
        .onPoint(cb)      註冊點擊格點回呼 (x,y)
        .setMarks(arr)    設定額外標記（練習提示用） */

(function (global) {
  'use strict';

  var BLACK = 1, WHITE = 2, EMPTY = 0;

  function BoardRenderer(canvas, engine, options) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.engine = engine;
    this.opts = options || {};
    this.eink = !!this.opts.eink;  // 墨水模式：純黑白、實心、無漸層、關閉落子預覽
    this.marks = [];          // [{x,y,type:'circle|triangle|square|dot', color, text}]
    this.ghost = null;        // 滑鼠預覽落子點
    this.pointCb = null;
    this._bindEvents();
    this.resize();
  }

  BoardRenderer.prototype.resize = function () {
    // 依 CSS 尺寸配置高解析度畫布
    var rect = this.canvas.getBoundingClientRect();
    var px = Math.max(300, Math.min(rect.width || 560, 640));
    var dpr = global.devicePixelRatio || 1;
    this.pixel = px;
    this.canvas.width = px * dpr;
    this.canvas.height = px * dpr;
    this.canvas.style.width = px + 'px';
    this.canvas.style.height = px + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var n = this.engine.size;
    this.pad = px * 0.06 + 8;          // 邊距（留座標）
    this.grid = (px - this.pad * 2) / (n - 1);
    this.stoneR = this.grid * 0.46;
    this.draw();
  };

  BoardRenderer.prototype._bindEvents = function () {
    var self = this;
    this.canvas.addEventListener('click', function (e) {
      var p = self._eventToGrid(e);
      if (p && self.pointCb) self.pointCb(p.x, p.y);
    });
    this.canvas.addEventListener('mousemove', function (e) {
      if (self.eink) return;  // 墨水模式不做落子預覽，避免移動時不斷重繪殘影
      var p = self._eventToGrid(e);
      var changed = (!!p !== !!self.ghost) ||
        (p && self.ghost && (p.x !== self.ghost.x || p.y !== self.ghost.y));
      self.ghost = p;
      if (changed) self.draw();
    });
    this.canvas.addEventListener('mouseleave', function () {
      if (self.ghost) { self.ghost = null; self.draw(); }
    });
  };

  BoardRenderer.prototype._eventToGrid = function (e) {
    var rect = this.canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var gx = Math.round((mx - this.pad) / this.grid);
    var gy = Math.round((my - this.pad) / this.grid);
    if (gx < 0 || gy < 0 || gx >= this.engine.size || gy >= this.engine.size) return null;
    // 只在靠近格點時有效
    var cx = this.pad + gx * this.grid;
    var cy = this.pad + gy * this.grid;
    if (Math.hypot(mx - cx, my - cy) > this.grid * 0.5) return null;
    return { x: gx, y: gy };
  };

  BoardRenderer.prototype.onPoint = function (cb) { this.pointCb = cb; };
  BoardRenderer.prototype.setMarks = function (arr) { this.marks = arr || []; this.draw(); };

  BoardRenderer.prototype._starPoints = function () {
    var n = this.engine.size;
    if (n === 13) return [[3, 3], [9, 3], [6, 6], [3, 9], [9, 9]];
    if (n === 9) return [[2, 2], [6, 2], [4, 4], [2, 6], [6, 6]];
    if (n === 19) return [[3, 3], [9, 3], [15, 3], [3, 9], [9, 9], [15, 9], [3, 15], [9, 15], [15, 15]];
    return [];
  };

  BoardRenderer.prototype.cx = function (x) { return this.pad + x * this.grid; };
  BoardRenderer.prototype.cy = function (y) { return this.pad + y * this.grid; };

  BoardRenderer.prototype.draw = function () {
    var ctx = this.ctx, n = this.engine.size, px = this.pixel;

    // 底色（墨水模式：純白平面，無漸層）
    if (this.eink) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, px, px);
    } else {
      var g = ctx.createLinearGradient(0, 0, px, px);
      g.addColorStop(0, '#f5c877');
      g.addColorStop(1, '#e8a94e');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, px, px);
    }

    var lineColor = this.eink ? '#000000' : '#5a3a1a';

    // 格線
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = this.eink ? 1.6 : 1.2;
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
      ctx.moveTo(this.cx(0), this.cy(i)); ctx.lineTo(this.cx(n - 1), this.cy(i));
      ctx.moveTo(this.cx(i), this.cy(0)); ctx.lineTo(this.cx(i), this.cy(n - 1));
    }
    ctx.stroke();

    // 座標標示（A.. / 1..）
    ctx.fillStyle = this.eink ? '#000000' : '#6b4a24';
    ctx.font = Math.max(9, this.grid * 0.32) + 'px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var letters = 'ABCDEFGHJKLMNOPQRST';
    for (var c = 0; c < n; c++) {
      ctx.fillText(letters[c], this.cx(c), this.pad - this.grid * 0.55);
      ctx.fillText(String(n - c), this.pad - this.grid * 0.6, this.cy(c));
    }

    // 星位
    var stars = this._starPoints();
    ctx.fillStyle = lineColor;
    for (var s = 0; s < stars.length; s++) {
      ctx.beginPath();
      ctx.arc(this.cx(stars[s][0]), this.cy(stars[s][1]), Math.max(2.5, this.grid * 0.08), 0, Math.PI * 2);
      ctx.fill();
    }

    // 落子預覽
    if (this.ghost && this.engine.get(this.ghost.x, this.ghost.y) === EMPTY) {
      this._drawStone(this.ghost.x, this.ghost.y, this.engine.turn, 0.35);
    }

    // 棋子
    for (var y = 0; y < n; y++) {
      for (var x = 0; x < n; x++) {
        var v = this.engine.board[y][x];
        if (v !== EMPTY) this._drawStone(x, y, v, 1);
      }
    }

    // 最後一手標記
    var lm = this.engine.lastMove;
    if (lm) {
      if (this.eink) {
        // 墨水：在棋子中央畫與棋子相反色的實心小方塊，高對比不靠顏色
        ctx.fillStyle = lm.color === BLACK ? '#ffffff' : '#000000';
        var hs = this.stoneR * 0.32;
        ctx.fillRect(this.cx(lm.x) - hs, this.cy(lm.y) - hs, hs * 2, hs * 2);
      } else {
        ctx.strokeStyle = '#ff5252';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(this.cx(lm.x), this.cy(lm.y), this.stoneR * 0.5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // 練習標記
    for (var m = 0; m < this.marks.length; m++) this._drawMark(this.marks[m]);
  };

  BoardRenderer.prototype._drawStone = function (x, y, color, alpha) {
    var ctx = this.ctx, cx = this.cx(x), cy = this.cy(y), r = this.stoneR;

    // 墨水模式：實心黑棋 / 白棋為白底粗黑框，無陰影無漸層
    if (this.eink) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      if (color === BLACK) {
        ctx.fillStyle = '#000000';
        ctx.fill();
      } else {
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.lineWidth = Math.max(2, r * 0.2);
        ctx.strokeStyle = '#000000';
        ctx.stroke();
      }
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    // 陰影
    ctx.beginPath();
    ctx.arc(cx + 1.5, cy + 2, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();
    // 立體漸層
    var rg = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.35, r * 0.1, cx, cy, r);
    if (color === BLACK) { rg.addColorStop(0, '#666'); rg.addColorStop(1, '#111'); }
    else { rg.addColorStop(0, '#fff'); rg.addColorStop(1, '#cfcfcf'); }
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = rg;
    ctx.fill();
    ctx.restore();
  };

  BoardRenderer.prototype._drawMark = function (m) {
    var ctx = this.ctx, cx = this.cx(m.x), cy = this.cy(m.y), r = this.stoneR * 0.6;
    var dflt = this.eink ? '#000000' : '#ff3b3b';
    ctx.save();
    ctx.lineWidth = this.eink ? 3.5 : 3;
    ctx.strokeStyle = m.color || dflt;
    ctx.fillStyle = m.color || dflt;
    if (m.type === 'circle') {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    } else if (m.type === 'square') {
      ctx.strokeRect(cx - r, cy - r, r * 2, r * 2);
    } else if (m.type === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(cx, cy - r); ctx.lineTo(cx - r, cy + r * 0.8); ctx.lineTo(cx + r, cy + r * 0.8);
      ctx.closePath(); ctx.stroke();
    } else if (m.type === 'dot') {
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2); ctx.fill();
    } else if (m.type === 'text') {
      ctx.fillStyle = m.color || '#ff3b3b';
      ctx.font = 'bold ' + (this.grid * 0.5) + 'px system-ui';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(m.text, cx, cy);
    }
    ctx.restore();
  };

  global.BoardRenderer = BoardRenderer;
})(window);

</script>
  <script>
/* 低段位電腦對手 —— 啟發式，故意「不太強」讓兒童有成就感
   策略優先序：
   1. 能吃掉對方（提子）就吃，優先吃多的
   2. 自己被打吃(剩 1 氣)就逃 / 或反提
   3. 避免自填(下了自己剩 1 氣的笨手)
   4. 靠近最後一手或己方棋子附近落子
   5. 隨機（偏中央） */

(function (global) {
  'use strict';

  var EMPTY = 0;

  function GoAI(engine, strength) {
    this.engine = engine;
    this.strength = (strength == null) ? 2 : strength;  // 0(最弱)~5(最強)
  }

  GoAI.prototype.setStrength = function (s) {
    this.strength = s;
  };

  // 計算「若在 (x,y) 落子後，自己這塊的氣」
  function selfLibertiesAfter(engine, x, y, color) {
    engine.board[y][x] = color;
    // 先移除被提的敵子以正確計氣

      var after = e.groupAndLiberties(esc.x, esc.y).liberties;
      e.board[esc.y][esc.x] = EMPTY;
      if (after < 2) continue;
      if (!allHaveLiberties(e, whites)) continue;
      return { stones: toStones(black, B).concat(toStones(whites, W)), turn: B, solutions: [esc] };
    }
    return null;
  }

  var GENERATORS = { capture: genCapture, atari: genAtari, escape: genEscape };

  var TEXT = {
    capture: {
      title: '吃子', concept: '吃子',
      desc: '白棋只剩一口氣了！輪到你（黑棋），找出那口氣把它吃掉。',
      hint: '白棋旁邊唯一還空著的點，就是它最後一口氣。',
      teach: '堵住對方最後一口氣，沒氣的棋就被提走。'
    },
    atari: {
      title: '打吃', concept: '打吃',
      desc: '輪到你（黑棋），下一手把白棋「打吃」——逼到只剩一口氣。',
      hint: '白棋還有兩口氣，堵掉其中一口就是打吃。',
      teach: '把對方逼到只剩一口氣，叫做打吃，下一手就能吃。'
    },
    escape: {
      title: '逃子', concept: '長氣',
      desc: '你的黑棋被打吃了，只剩一口氣！往哪裡逃可以增加氣、逃出去？',
      hint: '往還開著、沒有白棋的那個方向延伸。',
      teach: '往空的方向長出去，自己的氣就變多、逃離被吃。'
    }
  };

  // 產生某類別的一組題目（種子固定 → 可重現，星星進度可累積）
  function genSet(kind, seed, count) {
    var rand = makeRng(seed);
    var fn = GENERATORS[kind], tx = TEXT[kind];
    var out = [];
    var n = 0, guard = 0;
    while (out.length < count && guard < count * 20) {
      guard++;
      var p = fn(rand);
      if (!p) continue;
      n++;
      out.push({
        id: kind + '-' + n,
        title: tx.title + ' · 第 ' + n + ' 題',
        concept: tx.concept,
        desc: tx.desc,
        stones: p.stones,
        turn: p.turn,
        solutions: p.solutions,
        hint: tx.hint,
        teach: tx.teach
      });
    }
    return out;
  }

  global.ProblemGen = { genSet: genSet };
})(window);

  <script>
/* 對戰模式 —— 支援「雙人對戰」與「對電腦(低段位)」
   功能：輪流落子、顯示提子數、悔棋、虛手(Pass)、認輸、重新開始、終局粗略數子 */

(function (global) {
  'use strict';

  var B = 1, W = 2;

  // 對手等級：strength 0~5，附換算級/段標籤
  var LEVELS = [
    { strength: 0, label: '入門（約 20 級）' },
    { strength: 1, label: '初學（約 15 級）' },
    { strength: 2, label: '初級（約 10 級）' },
    { strength: 3, label: '中級（約 5 級）' },
    { strength: 4, label: '高級（約 1 級）' },
    { strength: 5, label: '高手（約 1 段）' }
  ];

  // 13 路讓子星位（依讓子數擺放）
  var HANDICAP_POINTS = {
    2: [[9, 3], [3, 9]],
    4: [[3, 3], [9, 3], [3, 9], [9, 9]],
    6: [[3, 3], [9, 3], [3, 9], [9, 9], [3, 6], [9, 6]],
    9: [[3, 3], [9, 3], [3, 9], [9, 9], [3, 6], [9, 6], [6, 3], [6, 9], [6, 6]]
  };

  // 電腦中盤認輸：走到「中盤」之後才評估，須「面積落後」且「材料(被吃子)落後」才投子
  var RESIGN_MIN_MOVES = 30;   // 至少下滿這麼多手才評估（避免開局亂認輸）
  var RESIGN_MARGIN = 18;      // 面積落後超過這麼多目視為落後
  var RESIGN_CAP_DIFF = 8;     // 且被黑吃掉的子比白吃掉的多這麼多（材料大幅落後，最可靠的訊號）

  function VsController(ui) {
    this.ui = ui;
    this.engine = new global.GoEngine(13);
    this.renderer = new global.BoardRenderer(ui.canvas, this.engine, { eink: !!ui.eink });
    this.level = ui.levelSel ? parseInt(ui.levelSel.value, 10) : 1;
    this.ai = new global.GoAI(this.engine, LEVELS[this.level].strength);
    this.handicap = ui.handicapSel ? parseInt(ui.handicapSel.value, 10) : 0;
    this.teachOff = ui.teachToggle ? !ui.teachToggle.checked : false;
    this.replaying = false;
    this.replayIdx = 0;
    this.mode = 'ai';        // 'ai' | 'human'
    this.aiColor = W;        // 電腦執白，玩家執黑先
    this.gameOver = false;
    this.thinking = false;

    var self = this;
    this.renderer.onPoint(function (x, y) { self.handleClick(x, y); });
    this.bind();
    this.restart();
  }

  VsController.prototype.bind = function () {
    var self = this, ui = this.ui;
    ui.modeSel.addEventListener('change', function () {
      self.mode = ui.modeSel.value;
      self.restart();
    });
    if (ui.levelSel) {
      ui.levelSel.addEventListener('change', function () {
        self.level = parseInt(ui.levelSel.value, 10);
        self.ai.setStrength(LEVELS[self.level].strength);
        self.restart();
      });
    }
    if (ui.handicapSel) {
      ui.handicapSel.addEventListener('change', function () {
        self.handicap = parseInt(ui.handicapSel.value, 10);
        self.restart();
      });
    }
    if (ui.teachToggle) {
      ui.teachToggle.addEventListener('change', function () {
        self.teachOff = !ui.teachToggle.checked;
        if (self.teachOff && ui.teachEl) ui.teachEl.textContent = '';
      });
    }
    if (ui.hintBtn) ui.hintBtn.addEventListener('click', function () { self.hint(); });
    if (ui.replayBtn) ui.replayBtn.addEventListener('click', function () { self.enterReplay(); });
    if (ui.rpFirst) ui.rpFirst.addEventListener('click', function () { self.replayGoto(0); });
    if (ui.rpPrev) ui.rpPrev.addEventListener('click', function () { self.replayGoto(self.replayIdx - 1); });
    if (ui.rpNext) ui.rpNext.addEventListener('click', function () { self.replayGoto(self.replayIdx + 1); });
    if (ui.rpLast) ui.rpLast.addEventListener('click', function () { self.replayGoto(self.engine.record.length - 1); });
    if (ui.rpExit) ui.rpExit.addEventListener('click', function () { self.exitReplay(); });
    ui.undoBtn.addEventListener('click', function () { self.undo(); });
    ui.passBtn.addEventListener('click', function () { self.pass(); });
    ui.resignBtn.addEventListener('click', function () { self.resign(); });
    ui.restartBtn.addEventListener('click', function () { self.restart(); });
  };

  VsController.prototype.restart = function () {
    if (this.replaying) this.exitReplay(true);
    this.engine.reset();
    this.gameOver = false;
    this.thinking = false;
    this.ui.scoreEl.textContent = '';
    if (this.ui.teachEl) this.ui.teachEl.textContent = '';

    // 讓子（僅對電腦時生效）：黑先擺讓子，之後白(電腦)先下
    var handInfo = '';
    if (this.mode === 'ai' && this.handicap > 0 && HANDICAP_POINTS[this.handicap]) {
      var pts = HANDICAP_POINTS[this.handicap];
      for (var i = 0; i < pts.length; i++) this.engine.board[pts[i][1]][pts[i][0]] = B;
      this.engine.turn = W;
      handInfo = '（讓 ' + this.handicap + ' 子）';
    }

    this.engine.recordReset();    // 以目前盤面（含讓子）為覆盤起點
    this.renderer.setMarks([]);   // 清掉提示標記並重繪
    this.refresh();

    if (this.mode === 'ai') {
      this.setStatus('對手：' + LEVELS[this.level].label + handInfo + '　開始對局！', '');
      if (this.isAiTurn()) { this.aiMove(); return; }
    } else {
      this.setStatus('雙人對戰　開始！黑棋先下 ⚫', '');
    }
  };

  VsController.prototype.refresh = function () {
    var e = this.engine;
    this.ui.turnEl.textContent = e.turn === B ? '⚫ 黑棋' : '⚪ 白棋';
    this.ui.capBlackEl.textContent = e.captures[B];
    this.ui.capWhiteEl.textContent = e.captures[W];
    this.ui.undoBtn.disabled = this.gameOver || !e.history.length;
  };

  VsController.prototype.setStatus = function (text, cls) {
    this.ui.statusEl.textContent = text;
    this.ui.statusEl.className = 'status ' + (cls || '');
  };

  VsController.prototype.isAiTurn = function () {
    return this.mode === 'ai' && this.engine.turn === this.aiColor;
  };

  VsController.prototype.handleClick = function (x, y) {
    if (this.gameOver || this.thinking || this.replaying) return;
    if (this.isAiTurn()) return;   // 電腦回合不接受點擊

    var res = this.engine.play(x, y);
    if (!res.legal) {
      this.setStatus('這裡不能下（' + reasonText(res.reason) + '）', 'warn');
      return;
    }
    this.renderer.setMarks([]);   // 落子後清掉提示標記
    this.afterMove(res, 'you');

    if (!this.gameOver && this.isAiTurn()) this.aiMove();
  };

  // 提示一手：用強 AI 評估幫目前該下的一方找個好點，標在盤上並解說為什麼
  VsController.prototype.hint = function () {
    if (this.gameOver || this.thinking || this.replaying) return;
    if (this.isAiTurn()) { this.setStatus('現在是電腦回合，等牠下完再按提示 🙂', 'warn'); return; }
    var color = this.engine.turn;
    var helper = new global.GoAI(this.engine, 5);
    var mv = helper.chooseMove(color);
    if (!mv) { this.setStatus('目前沒有適合的點，可以考慮「虛手」', 'warn'); return; }

    // 預覽這一手以取得解說，再還原（不真的落子）
    var res = this.engine.play(mv.x, mv.y);
    var comment = global.Teach
      ? global.Teach.commentMove(this.engine, mv.x, mv.y, color, res.captured.length)
      : { icon: '💡', text: '' };
    this.engine.undo();

    var mark = { x: mv.x, y: mv.y, type: 'square', color: this.ui.eink ? '#000000' : '#2a9d3f' };
    this.renderer.setMarks([mark]);
    this.setStatus('💡 建議下在 ' + coordLabel(this.engine, mv.x, mv.y) + '（方框處）', 'ok');
    if (this.ui.teachEl && !this.teachOff) {
      this.ui.teachEl.textContent = comment.icon + ' 為什麼：' + comment.text;
    }
  };

  // ===== 覆盤（棋譜回顧）=====
  VsController.prototype.enterReplay = function () {
    if (this.thinking) return;
    var rec = this.engine.record;
    if (!rec || rec.length < 2) {
      this.setStatus('還沒有棋步可以覆盤，先下幾手吧 🙂', 'warn');
      return;
    }
    // 保存目前實戰盤面，覆盤結束後還原
    this.savedLive = {
      board: this.engine.board.map(function (r) { return r.slice(); }),
      lastMove: this.engine.lastMove,
      turn: this.engine.turn,
      captures: { 1: this.engine.captures[1], 2: this.engine.captures[2] }
    };
    this.replaying = true;
    this.replayIdx = rec.length - 1;
    if (this.ui.replayBar) this.ui.replayBar.style.display = 'block';
    this.renderReplay();
  };

  VsController.prototype.exitReplay = function (silent) {
    if (!this.replaying) return;
    var s = this.savedLive;
    if (s) {
      this.engine.board = s.board.map(function (r) { return r.slice(); });
      this.engine.lastMove = s.lastMove;
      this.engine.turn = s.turn;
      this.engine.captures = { 1: s.captures[1], 2: s.captures[2] };
    }
    this.replaying = false;
    if (this.ui.replayBar) this.ui.replayBar.style.display = 'none';
    this.renderer.setMarks([]);
    this.refresh();
    if (!silent) this.setStatus('已離開覆盤，回到對局。', '');
  };

  VsController.prototype.replayGoto = function (idx) {
    var rec = this.engine.record;
    if (!this.replaying || !rec) return;
    this.replayIdx = Math.max(0, Math.min(idx, rec.length - 1));
    this.renderReplay();
  };

  VsController.prototype.renderReplay = function () {
    var rec = this.engine.record;
    var k = this.replayIdx;
    var f = rec[k];
    // 把該手盤面套進 engine 供繪製
    this.engine.board = f.board.map(function (r) { return r.slice(); });
    this.engine.lastMove = f.lastMove;
    this.renderer.setMarks([]);

    var total = rec.length - 1;
    var info;
    if (k === 0) {
      info = '起手前（第 0 / ' + total + ' 手）';
    } else if (f.pass) {
      info = '第 ' + k + ' / ' + total + ' 手：' + (f.pass === B ? '⚫ 黑' : '⚪ 白') + ' 虛手 (Pass)';
    } else if (f.lastMove) {
      var who = f.lastMove.color === B ? '⚫ 黑' : '⚪ 白';
      var coord = coordLabel(this.engine, f.lastMove.x, f.lastMove.y);
      info = '第 ' + k + ' / ' + total + ' 手：' + who + ' 下 ' + coord;
      if (global.Teach) {
        var c = global.Teach.commentMove(this.engine, f.lastMove.x, f.lastMove.y, f.lastMove.color, f.captured);
        info += '　' + c.icon + ' ' + c.text;
      }
    }
    if (this.ui.replayInfo) this.ui.replayInfo.textContent = info;
  };

  VsController.prototype.afterMove = function (res, who) {
    this.refresh();
    if (res.captured && res.captured.length) {
      this.setStatus('提子 ' + res.captured.length + ' 顆！', 'ok');
      this.captureFx(res.captured);
    } else {
      this.setStatus('', '');
    }
    this.showTeach(res.captured ? res.captured.length : 0, who);
  };

  // 解說：分析剛剛這一手的目的（你的或電腦的），顯示白話說明
  VsController.prototype.showTeach = function (captured, who) {
    var el = this.ui.teachEl;
    if (!el) return;
    if (this.teachOff || !global.Teach) { el.textContent = ''; return; }
    var lm = this.engine.lastMove;
    if (!lm) { el.textContent = ''; return; }
    var c = global.Teach.commentMove(this.engine, lm.x, lm.y, lm.color, captured);
    var subj = who === 'ai' ? '電腦這手 🤖' : '你這手 🙂';
    el.textContent = c.icon + ' ' + subj + '：' + c.text;
  };

  // 吃子小特效：每顆被提的棋位置噴一撮彩帶 + 啵一聲
  VsController.prototype.captureFx = function (caps) {
    if (!global.FX) return;
    var r = this.renderer;
    var rect = r.canvas.getBoundingClientRect();
    for (var i = 0; i < caps.length; i++) {
      global.FX.miniBurst(rect.left + r.cx(caps[i].x), rect.top + r.cy(caps[i].y), 14);
    }
    global.FX.pop();
  };

  // 中盤認輸評估：走到中盤後，電腦(白)若面積大幅落後就投子
  VsController.prototype.shouldAiResign = function () {
    if (this.mode !== 'ai' || this.gameOver) return false;
    var e = this.engine;
    var moves = e.record ? e.record.length - 1 : 0;
    if (moves < RESIGN_MIN_MOVES) return false;
    var s = e.scoreEstimate();
    var areaMargin = s.white - s.black;                    // 電腦(白)面積領先，負值=落後
    var capDiff = e.captures[B] - e.captures[W];           // 黑吃白 − 白吃黑，正值=白材料落後
    // 讓子局：黑先天有子，門檻放寬
    var areaThreshold = -(RESIGN_MARGIN + this.handicap * 3);
    // 兩條件同時成立才認輸：面積大幅落後，且被吃子明顯較多（避免面積估算雜訊誤判）
    return areaMargin <= areaThreshold && capDiff >= RESIGN_CAP_DIFF;
  };

  VsController.prototype.aiResign = function () {
    this.gameOver = true;
    this.thinking = false;
    var s = this.engine.scoreEstimate();
    this.setStatus('🏳️ 電腦認輸了，你贏了！🏆', 'ok');
    this.ui.scoreEl.textContent = '（電腦大幅落後：黑 ' + s.black + ' vs 白 ' + s.white + '，投子認輸）';
    if (this.ui.teachEl) this.ui.teachEl.textContent = '';
    this.refresh();
    if (global.FX) {
      global.FX.celebrate({ big: true, text: '🏆 你贏了！🏆<br><span class="sub">電腦認輸</span>' });
    }
  };

  VsController.prototype.aiMove = function () {
    var self = this;
    if (this.shouldAiResign()) { this.aiResign(); return; }
    this.thinking = true;
    this.setStatus('電腦思考中… 🤖', '');
    setTimeout(function () {
      var mv = self.ai.chooseMove(self.aiColor);
      if (!mv) {
        self.thinking = false;
        self.pass();
        return;
      }
      var res = self.engine.play(mv.x, mv.y);
      self.renderer.draw();
      self.thinking = false;
      self.afterMove(res, 'ai');
    }, 450);
  };

  VsController.prototype.undo = function () {
    if (this.gameOver || this.thinking || this.replaying) return;
    // 對電腦時一次退兩手(退回玩家)，雙人退一手
    this.engine.undo();
    if (this.mode === 'ai' && this.engine.turn === this.aiColor) this.engine.undo();
    this.renderer.draw();
    this.refresh();
    this.setStatus('悔棋一步 ↩️', '');
  };

  VsController.prototype.pass = function () {
    if (this.gameOver || this.thinking || this.replaying) return;
    var ended = this.engine.pass();
    this.renderer.draw();
    this.refresh();
    if (ended) {
      this.endByScore('雙方虛手，對局結束');
    } else {
      this.setStatus((this.engine.turn === B ? '黑棋' : '白棋') + '回合（對方虛手 Pass）', '');
      if (this.isAiTurn()) this.aiMove();
    }
  };

  VsController.prototype.resign = function () {
    if (this.gameOver) return;
    var loser = this.engine.turn; // 認輸方視為當前回合方(由按鈕方主動)
    this.gameOver = true;
    var winner = loser === B ? '白棋 ⚪' : '黑棋 ⚫';
    this.setStatus('認輸！' + winner + '獲勝 🏆', 'ok');
    this.refresh();
  };

  VsController.prototype.endByScore = function (prefix) {
    this.gameOver = true;
    var s = this.engine.scoreEstimate();
    // 兒童版：黑不貼目，直接比大小
    var winner, diff;
    if (s.black > s.white) { winner = '黑棋 ⚫'; diff = s.black - s.white; }
    else if (s.white > s.black) { winner = '白棋 ⚪'; diff = s.white - s.black; }
    else { winner = null; }
    var txt = prefix + '｜黑 ' + s.black + ' vs 白 ' + s.white + '。';
    if (winner) txt += winner + '贏 ' + diff + ' 子 🏆';
    else txt += '平手！';
    this.ui.scoreEl.textContent = '（粗估：黑地 ' + s.blackTerritory + '、白地 ' + s.whiteTerritory + '）';
    this.setStatus(txt, 'ok');
    this.refresh();
  };

  function reasonText(r) {
    return { occupied: '已有棋子', ko: '打劫不能馬上提回', suicide: '會沒有氣', out: '出界' }[r] || '不行';
  }

  // 座標標籤，如 (6,6) → G7（跳過 I）
  function coordLabel(engine, x, y) {
    var letters = 'ABCDEFGHJKLMNOPQRST';
    return letters[x] + (engine.size - y);
  }

  global.VsController = VsController;
})(window);

</script>
  <script>
/* 基礎棋形練習 —— 針對低段位兒童的入門棋形
   題型皆為「找出正確的一手」，點對了就過關。
   概念涵蓋：氣、打吃、提子、逃跑、連接、做眼做活、征子。
   座標以 13 路棋盤、左上為 (0,0)。 */

(function (global) {
  'use strict';

  var B = 1, W = 2;

  // 每題：
  //   id, title, concept, desc, hint
  //   stones: 初始佈局
  //   turn:   輪到誰(通常黑=玩家)
  //   solutions: [{x,y}] 允許的正解落點（點對即過）
  //   badHint: 點錯時的鼓勵提示（可省略）
  var PROBLEMS = [
    {
      id: 'liberty-1',
      title: '第 1 關 · 認識「氣」',
      concept: '氣',
      desc: '棋子旁邊空的地方叫做「氣」。中間這顆白棋只剩一口氣了（紅圈處）。' +
            '輪到你(黑棋)，下在紅圈把最後一口氣堵住，就能把白棋吃掉！',
      stones: [
        { x: 6, y: 6, color: W },
        { x: 6, y: 5, color: B },
        { x: 5, y: 6, color: B },
        { x: 7, y: 6, color: B }
      ],
      turn: B,
      solutions: [{ x: 6, y: 7 }],
      marks: [{ x: 6, y: 7, type: 'circle' }],
      hint: '白棋下面那個空點就是它最後一口氣。'
    },
    {
      id: 'atari-1',
      title: '第 2 關 · 打吃（叫吃）',

    this.engine = new global.GoEngine(13);
    this.renderer = new global.BoardRenderer(ui.canvas, this.engine, { eink: !!ui.eink });
    this.index = 0;
    this.solved = false;
    this.store = this.loadStore();   // { 題目id: true } 已過關紀錄
    this.categories = buildCategories();
    this.catIndex = 0;
    this.problems = this.categories[0].problems;
    var self = this;
    this.renderer.onPoint(function (x, y) { self.handleClick(x, y); });
    this.bind();
    this.populateCategories();
    this.renderStars();
    this.load(this.firstUnsolved());
  }

    for (var i = 0; i < this.categories.length; i++) {
      var c = this.categories[i];
      var o = document.createElement('option');
      o.value = String(i);
      o.textContent = c.name + '（' + c.level + '·' + c.problems.length + '題）';
      sel.appendChild(o);
    }
    sel.value = String(this.catIndex);
  };

  PracticeController.prototype.switchCategory = function (idx) {
    if (idx < 0 || idx >= this.categories.length) return;
    this.catIndex = idx;
    this.problems = this.categories[idx].problems;
    if (this.ui.categorySel) this.ui.categorySel.value = String(idx);
    this.load(this.firstUnsolved());
  };

  // ---- 進度存檔（localStorage，換頁/關掉重開都記得） ----
  PracticeController.prototype.loadStore = function () {
    try { return JSON.parse(global.localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { return {}; }
  };
  PracticeController.prototype.saveStore = function () {
    try { global.localStorage.setItem(STORE_KEY, JSON.stringify(this.store)); }
    catch (e) { /* 無痕模式等情況忽略 */ }
  };
  PracticeController.prototype.starCount = function () {
    var n = 0, ps = this.problems;
    for (var i = 0; i < ps.length; i++) if (this.store[ps[i].id]) n++;
    return n;
  };
  PracticeController.prototype.firstUnsolved = function () {
    var ps = this.problems;
    for (var i = 0; i < ps.length; i++) if (!this.store[ps[i].id]) return i;
    return 0;
  };

  // ---- 星星列：每關一顆，過關亮金星，可點擊跳關 ----
  PracticeController.prototype.renderStars = function () {
    var el = this.ui.starsEl;
    if (!el) return;
    el.innerHTML = '';
    var self = this, ps = this.problems;
    for (var i = 0; i < ps.length; i++) {
      var s = document.createElement('button');
      var done = !!this.store[ps[i].id];
      s.className = 'star' + (done ? ' done' : '') + (i === this.index ? ' current' : '');
      s.textContent = done ? (this.ui.eink ? '★' : '⭐') : (i + 1);
      s.title = ps[i].title;
      (function (idx) { s.addEventListener('click', function () { self.load(idx); }); })(i);
      el.appendChild(s);
    }
  };

  PracticeController.prototype.bind = function () {
    var self = this, ui = this.ui;
    if (ui.categorySel) {
      ui.categorySel.addEventListener('change', function () {
        self.switchCategory(parseInt(ui.categorySel.value, 10));
      });
    }
    ui.prevBtn.addEventListener('click', function () { self.load(self.index - 1); });
    ui.nextBtn.addEventListener('click', function () { self.load(self.index + 1); });
    ui.retryBtn.addEventListener('click', function () { self.load(self.index); });
    if (ui.resetBtn) {
      ui.resetBtn.addEventListener('click', function () {
        if (!global.confirm('確定要清除所有星星，重新挑戰嗎？')) return;
        self.store = {};
        self.saveStore();
        self.load(0);
      });
    }
  };

  PracticeController.prototype.load = function (i) {
    var ps = this.problems;
    if (i < 0) i = 0;
    if (i >= ps.length) i = ps.length - 1;
    this.index = i;
    this.solved = false;
    var p = ps[i];
    this.engine.setup(p.stones, p.turn);
    this.renderer.setMarks(p.marks || []);
    this.renderer.draw();

    this.ui.titleEl.textContent = p.title;
    this.ui.descEl.textContent = p.desc;
    this.ui.hintEl.textContent = '';
    this.ui.hintEl.classList.remove('show');
    if (this.ui.teachEl) this.ui.teachEl.textContent = '';
    if (this.store[p.id]) {
      this.setStatus('⭐ 這一關已經通過囉！想再玩一次就直接下正解 👆', 'ok');
    } else {
      this.setStatus('輪到你（黑棋），點棋盤下一手 👆', '');
    }
    this.ui.progressEl.textContent = this.category().name + '　第 ' + (i + 1) + ' / ' + ps.length + ' 題　⭐ 已得 ' + this.starCount() + '/' + ps.length;
    this.ui.prevBtn.disabled = (i === 0);
    this.ui.nextBtn.disabled = (i === ps.length - 1);
    this.renderStars();
  };

  PracticeController.prototype.setStatus = function (text, cls) {
    var el = this.ui.statusEl;
    el.textContent = text;
    el.className = 'status ' + (cls || '');
  };

  PracticeController.prototype.handleClick = function (x, y) {
    if (this.solved) return;
    var p = this.problems[this.index];
    var isSolution = p.solutions.some(function (s) { return s.x === x && s.y === y; });

    var res = this.engine.play(x, y);
    if (!res.legal) {
      this.setStatus('這裡不能下喔（' + reasonText(res.reason) + '），換一個點試試 🙂', 'warn');
      return;
    }
    this.renderer.setMarks([]);
    this.renderer.draw();

    if (isSolution) {
      this.solved = true;
      var newStar = !this.store[p.id];
      this.store[p.id] = true;
      this.saveStore();
      this.renderStars();
      var got = this.starCount();
      var total = this.problems.length;
      var msg = '🎉 答對了！' + (res.captured.length ? '成功吃掉 ' + res.captured.length + ' 顆白棋！' : '漂亮的一手！');
      if (newStar) msg += ' ⭐ 得到一顆星（' + got + '/' + total + '）';
      var allClear = (got === total);
      if (allClear) msg = '🏆「' + this.category().name + '」' + total + ' 題全部通關！澂澂好棒！🎉';
      this.setStatus(msg, 'ok');
      this.ui.progressEl.textContent = this.category().name + '　第 ' + (this.index + 1) + ' / ' + total + ' 題　⭐ 已得 ' + got + '/' + total;
      var teachText = p.teach || TEACH[p.id];
      if (this.ui.teachEl && teachText) {
        this.ui.teachEl.textContent = '📖 這一步的目的：' + teachText;
      }
      celebrate(this.ui.canvas);
      // 誇張過關特效
      var wrap = this.ui.canvas.parentNode;
      if (global.FX) {
        if (allClear) {
          global.FX.celebrate({ big: true, shakeEl: wrap });
        } else {
          global.FX.celebrate({ text: '🎉 第 ' + (this.index + 1) + ' 關 過關囉！ ⭐', shakeEl: wrap });
        }
      }
    } else {
      this.setStatus('差一點點～再想想看 💪', 'warn');
      this.ui.hintEl.textContent = '💡 提示：' + p.hint;
      this.ui.hintEl.classList.add('show');
      // 讓小孩看到後果後可再試：短暫延遲後還原此手
      var self = this;
      setTimeout(function () {
        self.engine.undo();
        self.renderer.setMarks(p.marks || []);
        self.renderer.draw();
      }, 900);
    }
  };

  function reasonText(r) {
    return { occupied: '已經有棋子', ko: '打劫暫時不能下', suicide: '會沒有氣', out: '超出棋盤' }[r] || '不行';
  }

  function celebrate(canvas) {
    canvas.classList.remove('celebrate');
    void canvas.offsetWidth;
    canvas.classList.add('celebrate');
  }

  global.PracticeController = PracticeController;
  global.GO_PROBLEMS = PROBLEMS;
})(window);

</script>

    // 分頁切換
    var tabs = document.querySelectorAll('.tab');

        document.getElementById('page-' + t.dataset.page).classList.add('active');
      });
    });

    // 啟動對戰（墨水模式）
    var vs = new VsController({

      turnEl: document.getElementById('vs-turn'),
      capBlackEl: document.getElementById('vs-cap-black'),
      capWhiteEl: document.getElementById('vs-cap-white'),
      statusEl: document.getElementById('vs-status'),
      teachEl: document.getElementById('vs-teach'),
      teachToggle: document.getElementById('vs-teach-toggle'),
      scoreEl: document.getElementById('vs-score'),
      modeSel: document.getElementById('vs-mode'),

      handicapSel: document.getElementById('vs-handicap'),

      replayBtn: document.getElementById('vs-replay'),
      replayBar: document.getElementById('vs-replay-bar'),
      replayInfo: document.getElementById('vs-replay-info'),
      rpFirst: document.getElementById('vs-rp-first'),
      rpPrev: document.getElementById('vs-rp-prev'),
      rpNext: document.getElementById('vs-rp-next'),
      rpLast: document.getElementById('vs-rp-last'),
      rpExit: document.getElementById('vs-rp-exit'),
      undoBtn: document.getElementById('vs-undo'),
      passBtn: document.getElementById('vs-pass'),
      resignBtn: document.getElementById('vs-resign'),
      restartBtn: document.getElementById('vs-restart')
    });

    // 啟動練習（墨水模式）
    var practice = new PracticeController({
      eink: true,
      canvas: document.getElementById('pr-canvas'),
      titleEl: document.getElementById('pr-title'),
      descEl: document.getElementById('pr-desc'),
      hintEl: document.getElementById('pr-hint'),
      statusEl: document.getElementById('pr-status'),
      teachEl: document.getElementById('pr-teach'),
      categorySel: document.getElementById('pr-category'),
      progressEl: document.getElementById('pr-progress'),
      starsEl: document.getElementById('pr-stars'),
      prevBtn: document.getElementById('pr-prev'),
      nextBtn: document.getElementById('pr-next'),
      retryBtn: document.getElementById('pr-retry'),
      resetBtn: document.getElementById('pr-reset')
    });
  </script>
